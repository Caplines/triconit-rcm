primary.close.query=from insurance_claim i JOIN patient p on i.patient_id = p.patient_id JOIN transactions t on i.claim_id = t.claim_id where i.claim_type = 'C' AND i.prim_status = 'd' AND t.type = 'S' AND Date(t.tran_date) BETWEEN 'DATE1' AND 'DATE2'
primary.close.count=5
primary.close.selectcolumns=DISTINCT i.claim_id,i.patient_id,i.prim_status,t.tran_date, t.type
secondary.close.query=from insurance_claim i JOIN patient p on i.patient_id = p.patient_id JOIN transactions t on i.claim_id = t.claim_id where i.claim_type = 'C' AND i.sec_status = 'd' AND t.type = 'S' AND Date(t.tran_date) BETWEEN 'DATE1' AND 'DATE2'
secondary.close.count=5
secondary.close.selectcolumns=DISTINCT i.claim_id,i.patient_id,i.sec_status,t.tran_date,t.type

claim.duebal.query=from patient p where p.responsible_party = (SELECT p.responsible_party FROM patient p WHERE p.patient_id  = 'patientIdId') GROUP BY p.responsible_party
claim.duebal.query.count=2
claim.duebal.query.selectcolumns=SUM(p.current_bal + p.thirty_day + p.sixty_day + p.ninety_day + p.contract_balance) as total_balance,p.responsible_party
