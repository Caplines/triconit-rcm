claim.unbilled.primary.query=from insurance_claim  i JOIN patient  p on  i.patient_id = p.patient_id JOIN  transactions t on i.claim_id =  t.claim_id JOIN insurance_company ic ON ic.insurance_company_id = i.prim_insurance_company_id JOIN patient_letter  pl on  p.patient_id = pl.patient_id JOIN employer e ON e.employer_id = p.prim_employer_id where  i.claim_type = 'C' AND (i.prim_status = 'P' or i.prim_status = 'E' ) AND t.type='S'
claim.unbilled.primary.query.count=20
claim.unbilled.primary.query.selectcolumns=distinct i.claim_id,i.patient_id,(p.first_name+' '+p.last_name),p.birth_date,t.tran_date,i.submitted_total,i.claim_type,i.prim_status,i.provider_id,i.prim_submitted_total,i.prim_insurance_company_id,ic.name,p.prim_member_id,(ic.address_1 + ' '+ ic.address_2 +' '+ ic.city +' '+ ic.state +' '+ ic.zipcode),e.group_number,pl.prim_policy_holder,p.home_phone,p.work_phone,p.cell_phone,(SELECT birth_date from patient where patient_id=p.prim_responsible_id)

claim.unbilled.secondary.query=from insurance_claim  i JOIN patient  p on  i.patient_id = p.patient_id JOIN  transactions t on i.claim_id =  t.claim_id JOIN insurance_company ic ON ic.insurance_company_id = i.sec_insurance_company_id JOIN patient_letter  pl on  p.patient_id = pl.patient_id JOIN employer e ON e.employer_id = p.sec_employer_id where  i.claim_type = 'C' AND (i.sec_status = 'P' or i.sec_status = 'E' or i.sec_status = 'U') AND t.type='S'
claim.unbilled.secondary.query.count=22
claim.unbilled.secondary.query.selectcolumns=distinct i.claim_id,i.patient_id,(p.first_name+' '+p.last_name),p.birth_date,t.tran_date,i.submitted_total,i.claim_type,i.sec_status,i.provider_id,i.sec_submitted_total,i.sec_insurance_company_id,ic.name,p.sec_member_id,(ic.address_1 + ' '+ ic.address_2 +' '+  ic.city +' '+  ic.state +' '+  ic.zipcode),e.group_number,pl.sec_policy_holder,p.home_phone,p.work_phone,p.cell_phone,(SELECT birth_date from patient where patient_id=p.sec_responsible_id),i.prim_date_sent,i.prim_total_paid

claim.insurance.query=from insurance_company
claim.insurance.query.count=2
claim.insurance.query.selectcolumns=insurance_company_id,name

claim.appointment.query= from patient p JOIN appointment a ON p.patient_id = a.patient_id WHERE Date(a.start_time) BETWEEN 'DATE1' AND 'DATE1' AND p.patient_id = 'PAT_ID'
claim.appointment.query.count=3
claim.appointment.query.selectcolumns=p.patient_id,a.start_time,a.start_time

#Reconciliation Queries
primary.unbilled.query=from insurance_claim  i JOIN patient  p on  i.patient_id = p.patient_id JOIN  transactions t on i.claim_id =  t.claim_id where  i.claim_type = 'C' AND (i.prim_status = 'P' or i.prim_status = 'E' ) AND t.type='S'
primary.unbilled.count=3
primary.unbilled.selectcolumns=distinct i.claim_id,i.patient_id,i.prim_status
secondary.unbilled.query=from insurance_claim  i JOIN patient  p on  i.patient_id = p.patient_id JOIN  transactions t on i.claim_id =  t.claim_id where  i.claim_type = 'C' AND (i.sec_status = 'P' or i.sec_status = 'E' ) AND t.type='S'
secondary.unbilled.count=3
secondary.unbilled.selectcolumns=distinct i.claim_id,i.patient_id,i.sec_status

primary.open.query=from insurance_claim  i JOIN patient  p on  i.patient_id = p.patient_id JOIN  transactions t on i.claim_id =  t.claim_id where  i.claim_type = 'C' AND i.prim_status = 'o'
primary.open.count=3
primary.open.selectcolumns=distinct i.claim_id,i.patient_id,i.prim_status
secondary.open.query=from insurance_claim  i JOIN patient  p on  i.patient_id = p.patient_id JOIN  transactions t on i.claim_id =  t.claim_id where  i.claim_type = 'C' AND i.sec_status = 'o'
secondary.open.count=3
secondary.open.selectcolumns=distinct i.claim_id,i.patient_id,i.prim_status

secondary.unsubmitted.query=from insurance_claim  i JOIN patient  p on  i.patient_id = p.patient_id JOIN  transactions t on i.claim_id =  t.claim_id where  i.claim_type = 'C' AND i.sec_status = 'u'
secondary.unsubmitted.count=3
secondary.unsubmitted.selectcolumns=distinct i.claim_id,i.patient_id,i.sec_status

primary.close.query=from insurance_claim i JOIN patient p on i.patient_id = p.patient_id JOIN transactions t on i.claim_id = t.claim_id where i.claim_type = 'C' AND i.prim_status = 'd' AND t.type = 'S' AND Date(t.tran_date) BETWEEN 'DATE1' AND 'DATE2'
primary.close.count=5
primary.close.selectcolumns=DISTINCT i.claim_id,i.patient_id,i.prim_status,t.tran_date, t.type
secondary.close.query=from insurance_claim i JOIN patient p on i.patient_id = p.patient_id JOIN transactions t on i.claim_id = t.claim_id where i.claim_type = 'C' AND i.sec_status = 'd' AND t.type = 'S' AND Date(t.tran_date) BETWEEN 'DATE1' AND 'DATE2'
secondary.close.count=5
secondary.close.selectcolumns=DISTINCT i.claim_id,i.patient_id,i.sec_status,t.tran_date,t.type

claim.duebal.query=from patient p where p.responsible_party = (SELECT p.responsible_party FROM patient p WHERE p.patient_id  = 'patientIdId') GROUP BY p.responsible_party
claim.duebal.query.count=2
claim.duebal.query.selectcolumns=SUM(p.current_bal + p.thirty_day + p.sixty_day + p.ninety_day + p.contract_balance) as total_balance,p.responsible_party

