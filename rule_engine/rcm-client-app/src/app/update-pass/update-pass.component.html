<div class="right-container"[ngClass]="{'setPadding':appService.setPaddingContainer}">
    <ng-container *ngIf="alert.showAlertPopup">
        <div class="alert fade show text-center my-3" [ngClass]="{'alert-success': !this.alert.isError,'alert-danger':this.alert.isError}" role="alert">
            <strong>{{alert.alertMsg}}</strong>
            <button type="button" class="close" data-dismiss="alert" aria-label="Close"
                (click)="alert.showAlertPopup=false;">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
    </ng-container>

    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12 pt-3">
                <div class="main-container">
                    <div class="form-container detail-box ">
                        <ng-container>
                            <div class="row">
                                <div class="col-sm-3">
                                    <div class="form-group">
                                        <label for="changepass">Enter the Old Password :</label>
                                        <input type="text" class="form-control" [(ngModel)]="user['oldPassword']"
                                            [ngClass]="{'is-invalid': user['oldPassword'] && (user['oldPassword']=='' || user['oldPassword'].length<6)}"
                                            >
                                    </div>
                                    <div class="form-group">
                                        <label for="changepass">Enter the New Password :</label>
                                        <input type="text" class="form-control" [(ngModel)]="user['newPassword']"
                                            [ngClass]="{'is-invalid': user['newPassword'] && (user['oldPassword'].length<6 || user['newPassword'].length<6)}"
                                            >
                                    </div>
                                    <div class="find-btn">
                                        <button type="button" class="btn btn-success" [disabled]="!user['oldPassword'] || !user['newPassword'] || user['oldPassword'].length<6 || user['newPassword'].length<6"  [ngClass]="{'disabled':!user['oldPassword'] || !user['newPassword'] || user['oldPassword'].length<6 || user['newPassword'].length<6}"(click)="changePassword()">Change
                                            Password</button>
                                    </div>
                                </div>
                            </div>
                        </ng-container>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
