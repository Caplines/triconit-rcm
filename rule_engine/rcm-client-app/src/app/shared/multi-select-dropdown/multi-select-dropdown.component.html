<div>
    <div (mouseleave)="showDropDown = false" *ngIf="!inputConfig?.isSearchClaims">
        <button class="drop-toggle asdfsf btn flat" (click)="showDropDown=!showDropDown">
            <span *ngIf="clientCheckedList.length<=0 ||  teamCheckedList.length<=0 ">Select</span>
            <span *ngIf="clientCheckedList.length>0 && isClient">
                <ng-container *ngFor="let item of clientCheckedList; let last = last"> {{ item.name }}{{last ? '':
                    ','}}</ng-container>
            </span>
            <span *ngIf="teamCheckedList.length>0 && isTeam">
                <ng-container *ngFor="let item of teamCheckedList; let last = last"> {{item.teamName}}{{last ? '':
                    ','}}</ng-container>
            </span>
            <i class="fa fa-angle-down"></i>
        </button>
        <div class="drop-show" *ngIf="showDropDown && isClient">
            <label>
                <input type="checkbox" (change)="selectAll($event,'client')" [checked]="selectAllChecked">
                <span>{{list.length == clientCheckedList.length ? 'Clear All' : 'Select All'}}</span>
            </label>
            <label *ngFor="let a of list;let idx = index">
                <input type="checkbox" [(ngModel)]="a.checked"
                    (change)="getSelectedValue(a.checked,list[idx],'client')" />
                <span>{{a.name}}</span>
            </label>
        </div>
        <div class="drop-show" *ngIf="showDropDown && isClient && isFromUserSetting">
            <label>
                <input type="checkbox" (change)="selectAll($event,'client')" [checked]="selectAllChecked">
                <span>{{list.length == clientCheckedList.length ? 'Clear All' : 'Select All'}}</span>
            </label>
            <label *ngFor="let a of list;let idx = index">
                <input type="checkbox" [(ngModel)]="a.checked"
                    (change)="getSelectedValue(a.checked,list[idx],'userSettingClient')" />
                <span>{{a.name}}</span>
            </label>
        </div>
        <div class="drop-show-team" *ngIf="showDropDown && isTeam">
            <label>
                <input type="checkbox" (change)="selectAll($event,'team')" [checked]="selectAllChecked">
                <span>{{list.length == teamCheckedList.length ? 'Clear All' : 'Select All'}}</span>
            </label>
            <label *ngFor="let a of list;let idx = index">
                <input type="checkbox" [(ngModel)]="a.checked"
                    (change)="getSelectedValue(a.checked,list[idx],'userSettingTeam')" />
                <span>{{a.teamName}}</span>
            </label>
        </div>
    </div>

    <!-- SEARCH CLAIMS Client -->

    <div class="search-claims" (mouseleave)="showDropDown = false"
        *ngIf="inputConfig?.isSearchClaims && inputConfig?.clientData">
        <button class="drop-toggle btn flat" (click)="showDropDown=!showDropDown">
            <span *ngIf="searchClaimsConfig.clients.length<=0">Select</span>
            <span *ngIf="searchClaimsConfig.clients.length>0">
                <ng-container *ngFor="let item of searchClaimsConfig.clients; let last = last"> {{ item.clientName
                    }}{{last ? '': ','}}</ng-container>
            </span>
            <i class="fa fa-angle-down"></i>
        </button>
        <div class="drop-show no-css-search-claim" *ngIf="showDropDown">
            <label *ngFor="let item of inputConfig.clientData;let idx = index">
                <input type="checkbox" [(ngModel)]="item.checked"
                    (change)="getSelectedValue(item.checked,item,'searchClaimClient')" />
                <span>{{item.clientName}}</span>
            </label>
        </div>
    </div>

                    (change)="getSelectedValue(item.checked,item,'searchClaimOffices')" />
                <span>{{item.name}}</span>

        </div>
    </div>

     <!-- Insurance Name -->
    <div class="search-claims-insuranceNames" (mouseleave)="showDropDown = false"
         *ngIf="inputConfig?.isSearchClaims && inputConfig?.insuranceNames">
         <span (click)="clearAll('insuranceNames')" *ngIf="searchClaimsConfig.insuranceNames.length>0">(Clear All)</span>
        <button class="drop-toggle insurance-name-dropbox btn flat" (mouseleave)="searchText=''" *ngIf="searchClaimsConfig?.insuranceNames.length>0">
            <span>
                <ng-container *ngFor="let item of searchClaimsConfig.insuranceNames; let last = last">
                    <span *ngIf="item.checked"> {{ item.name}}{{last ? '': ','}}</span>
                    <span class="fs-6 fw-bold">X</span>
                    <br>
                </ng-container>
            </span>
        </button>
        <div>
            <input type="text" placeholder="Search..." [(ngModel)]="searchText" (input)="filterOptions('insuranceNames')" class="no-css-input-box">
            <div class="drop-show no-css-search-claim"  *ngIf="searchText">
                <label for="selectAll" *ngIf="filteredOptions.insuranceNames.length>0">
                    <input type="checkbox" id="selectAll" (change)="getSelectedValue(true,'','selectAll','insuranceNames')">
                    &nbsp; Select All
                </label>
                <label for="selectAll" *ngIf="filteredOptions.insuranceNames.length==0">
                    No Data Found
                </label>
                <label *ngFor="let item of filteredOptions.insuranceNames">
                    <input type="checkbox" [(ngModel)]="item.checked"
                           (change)="getSelectedValue(item.checked,item,'insuranceNames')" id="{{ item.name }}">
                    <span>{{item.name}}</span>
                </label>
            </div>
        </div>
    </div>

            <!-- teams -->

last ?
