<div>
    <div (mouseleave)="showDropDown = false" *ngIf="!inputConfig?.isSearchClaims && !inputConfig?.isListOfClaims ">
        <button class="drop-toggle btn flat" (click)="showDropDown=!showDropDown">
            <span *ngIf="clientCheckedList.length<=0 ||  teamCheckedList.length<=0 ">Select</span>
            <span *ngIf="clientCheckedList.length>0 && isClient">
                <ng-container *ngFor="let item of clientCheckedList; let last = last"> {{ item.name }}{{last ? '':
                    ','}}</ng-container>
            </span>
            <span *ngIf="teamCheckedList.length>0 && isTeam">
                <ng-container *ngFor="let item of teamCheckedList; let last = last"> {{item.teamName}}{{last ? '':
                    ','}}</ng-container>
            </span>
            <i class="fa fa-angle-down"></i>
        </button>
        <div class="drop-show" *ngIf="showDropDown && isClient">
            <label>
                <input type="checkbox" (change)="selectAll($event,'client')" [checked]="selectAllChecked">
                <span>{{list.length == clientCheckedList.length ? 'Clear All' : 'Select All'}}</span>
            </label>
            <label *ngFor="let a of list;let idx = index">
                <input type="checkbox" [(ngModel)]="a.checked"
                    (change)="getSelectedValue(a.checked,list[idx],'client')" />
                <span>{{a.name}}</span>
            </label>
        </div>
        <div class="drop-show" *ngIf="showDropDown && isClient && isFromUserSetting">
            <label>
                <input type="checkbox" (change)="selectAll($event,'client')" [checked]="selectAllChecked">
                <span>{{list.length == clientCheckedList.length ? 'Clear All' : 'Select All'}}</span>
            </label>
            <label *ngFor="let a of list;let idx = index">
                <input type="checkbox" [(ngModel)]="a.checked"
                    (change)="getSelectedValue(a.checked,list[idx],'userSettingClient')" />
                <span>{{a.name}}</span>
            </label>
        </div>
        <div class="drop-show no-css-search-claim" *ngIf="showDropDown && isTeam">
            <label>
                <input type="checkbox" (change)="selectAll($event,'teams')" [checked]="selectAllChecked">
                <span>{{list.length == teamCheckedList.length ? 'Clear All' : 'Select All'}}</span>
            </label>
            <label *ngFor="let a of list;let idx = index">
                <input type="checkbox" [(ngModel)]="a.checked"
                    (change)="getSelectedValue(a.checked,list[idx],'userSettingTeam')" />
                <span>{{a.teamName}}</span>
            </label>
        </div>
    </div>

    <!-- SEARCH CLAIMS Client -->

    <div class="search-claims filter-box" (mouseleave)="showDropDown = false"
        *ngIf="inputConfig?.isSearchClaims && inputConfig?.clients">
        <span (click)="clearAll('clients','getSelectClientName')" *ngIf="searchClaimsConfig.clients.length>0" class="clearAll">(Clear All)</span>
        <button class="drop-toggle btn flat" (click)="toggleSelectedItem('clients')" *ngIf="searchClaimsConfig?.clients.length>0">
            <span [ngClass]="{'hide-item':showSelectedData['clients']}">
                <ng-container *ngFor="let item of searchClaimsConfig.clients; let last = last">
                    <span *ngIf="item.checked" > {{ item.clientName}}{{last ? '': ','}}</span>
                    <br>
                </ng-container>
            </span>
        </button>
        <div>
            <input type="text" placeholder="Search..." [(ngModel)]="searchText" (input)="filterOptions('clients')"
                class="no-css-input-box">
            <div class="drop-show no-css-search-claim"*ngIf="searchText" (mouseleave)="searchText=''" >
                <!-- <label>
                        <input type="checkbox" (change)="getSelectedValue(!isAllSelected['clients'],'','selectAllClient','clients')" [checked]="isAllSelected['clients']">
                        <span>{{inputConfig.clients.length == searchClaimsConfig.clients.length ? 'Clear All' : 'Select All'}}</span>
                    </label> -->
                    <label for="selectAll" *ngIf="filteredOptions.clients.length==0">
                        No Data Found
                    </label>
                <label *ngFor="let item of filteredOptions.clients;let idx = index">
                    <input type="checkbox" [(ngModel)]="item.checked"
                        (change)="getSelectedValue(item.checked,item,'searchClaimClient','clients')" />
                    <span>{{item.clientName}}</span>
                </label>
            </div>
        </div>
        </div>
