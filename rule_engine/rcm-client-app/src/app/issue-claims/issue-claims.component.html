<div class="sticky-top bg-dark">
    <div class="topbar" style="justify-content: flex-start;">
        <a class="backBtn" (click)="goToClaimDetailPage()"><img src="../../assets/img/arrow-back.png"
                [style]="{width:'16px'}"></a>
        <h1>Capline RCM</h1>
    </div>
</div>
<div class="container-fluid">
    <div class="row">
        <div class="col-lg-12 pt-5">
            <h6 class="page-heading">Issue Claims</h6>
            <div class="main-container">
                <div class="row">
                    <div class="col-md-12 mb-2">
                        <div class="detail-box">
                            <div class="detail-box-form">
                                <div class="form-row collapse show" style="border-radius: 10px 10px 0px 0px;">
                                    <h6 style="color: black;">Upload Errors : <span class="number-of-claims" style="pointer-events:none;">Number of Claims Not Uploaded: {{issueClaimsCount}}</span></h6> 
                                    <div class="table-responsive" >
                                        <table class="table table-wrapper-scroll-y table-inner-scrollbar" #modalElement (scroll)="onModalScroll()"   id="issuetable"  *ngIf="issueCl?.length>0">
                                            <thead>
                                                <tr class="totalRow">
                                                    <th colspan="6">
                                                        <div class="dFlex">
                                                            Office Name <span class="sorting">
                                                            <a href="javascript:void(0);" class="arrow-up"
                                                                [ngClass]="{'selected': !isSorted['officeName']}"
                                                                (click)="sortData(filteredItems,'officeName','asc','string'); isSorted['officeName'] = false"></a>
                                                            <a href="javascript:void(0);" class="arrow-down"
                                                                [ngClass]="{'selected': isSorted['officeName']}"
                                                                (click)="sortData(filteredItems,'officeName','desc','string');isSorted['officeName'] = true"></a>
                                                        </span>                                                         
                                                        </div>
                                                    </th>
                                                    <th colspan="6" >
                                                        <div class="dFlex">
                                                        Claim ID <span class="sorting">
                                                            <a href="javascript:void(0);" class="arrow-up"
                                                                [ngClass]="{'selected': !isSorted['claimId']}"
                                                                (click)="sortData(filteredItems,'claimId','asc','number'); isSorted['claimId'] = false"></a>
                                                            <a href="javascript:void(0);" class="arrow-down"
                                                                [ngClass]="{'selected': isSorted['claimId']}"
                                                                (click)="sortData(filteredItems,'claimId','desc','number');isSorted['claimId'] = true"></a>
                                                        </span>
                                                        </div>
                                                    </th>
                                                    <th colspan="6">
                                                        <div class="dFlex">  
                                                            Upload Date <span class="sorting">
                                                            <a href="javascript:void(0);" class="arrow-up"
                                                                [ngClass]="{'selected': !isSorted['createdDate']}"
                                                                (click)="sortData(filteredItems,'date','asc','date'); isSorted['createdDate'] = false"></a>
                                                            <a href="javascript:void(0);" class="arrow-down"
                                                                [ngClass]="{'selected': isSorted['createdDate']}"
                                                                (click)="sortData(filteredItems,'date','desc','date');isSorted['createdDate'] = true"></a>
                                                            </span>
                                                        </div>
                                                    </th>
                                                    <th colspan="6" style="min-width: 170px;">
                                                        <div class="dFlex">  
                                                        Issue due to which Claim could not be Uploaded <span class="sorting">
                                                            <a href="javascript:void(0);" class="arrow-up"
                                                                [ngClass]="{'selected': !isSorted['issue']}"
                                                                (click)="sortData(filteredItems,'issue','asc','string'); isSorted['issue'] = false"></a>
                                                            <a href="javascript:void(0);" class="arrow-down"
                                                                [ngClass]="{'selected': isSorted['issue']}"
                                                                (click)="sortData(filteredItems,'issue','desc','string');isSorted['issue'] = true"></a>
                                                            </span>
                                                        </div>
                                                    </th>
                                                    <th colspan="6">
                                                        <div class="dFlex">  
                                                        Source <span class="sorting">
                                                            <a href="javascript:void(0);" class="arrow-up"
                                                                [ngClass]="{'selected': !isSorted['source']}"
                                                                (click)="sortData(filteredItems,'source','asc','string'); isSorted['source'] = false"></a>
                                                            <a href="javascript:void(0);" class="arrow-down"
                                                                [ngClass]="{'selected': isSorted['source']}"
                                                                (click)="sortData(filteredItems,'source','desc','string');isSorted['source'] = true"></a>
                                                            </span>
                                                        </div>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr *ngFor="let lg of issueCl;let idx=index;">
                        
                                                    <td colspan="6">{{lg.officeName}}</td>
                                                    <td colspan="6">{{lg.claimId}}</td>
                                                    <td colspan="6">{{lg.createdDate | date:'MMM dd, YYYY HH:mm:ss'}}</td>
                                                    <td colspan="6">{{lg.issue}}</td>
                                                    <td colspan="6">{{lg.source}}</td>
                                                    
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
            
    </div>
    </div>
    </div>
    </div>
</div>
</div>
</div>
</div>
</div>
