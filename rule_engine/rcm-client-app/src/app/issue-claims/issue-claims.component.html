<div class="sticky-top bg-dark">
    <div class="topbar" style="justify-content: flex-start;">
        <a class="backBtn" (click)="goToClaimDetailPage()"><img src="../../assets/img/arrow-back.png"
                [style]="{width:'16px'}"></a>
        <h1>Capline RCM</h1>
    </div>
</div>
<div class="container-fluid">
    <div class="row">
        <div class="col-lg-12 pt-5">
            <h6 class="page-heading">Issue Claims</h6>
            <div class="main-container">
                <div class="row">
                    <div class="col-md-12 mb-2">
                        <div class="detail-box">
                            <div class="detail-box-form">
                                <div class="form-row collapse show" style="border-radius: 10px 10px 0px 0px;">
                                    <h6 style="color: black;">Upload Errors : <span class="number-of-claims" style="pointer-events:none;">Number of Claims Not Uploaded: {{issueClaimsCount}}</span></h6> 
                                    <div>
                                        <button type="button" class="icon-btn" (click)="saveToPdf('issuetable')" [disabled]="filteredItems.length==0">
                                            <img src="../../assets/img/pdf.png" /></button><span *ngIf="loader.exportPDFLoader"
                                            class="spinner-border text-danger mx-1"></span>
                                        <button type="button" class="icon-btn" (click)="exportToCsv()" [disabled]="filteredItems.length==0">
                                            <img src="../../assets/img/xls.png" /></button><span *ngIf="loader.exportCSVLoader"
                                            class="spinner-border text-success mx-1"></span>
                                    </div>
                                    <div class="table-responsive" >
                                        <table class="table table-wrapper-scroll-y table-inner-scrollbar" #modalElement (scroll)="onModalScroll()"   id="issuetable"  *ngIf="issueCl?.length>0">
                                            <thead>
                                                <tr class="totalRow">
                                                    <th colspan="6">
                                                        <div class="dFlex">
                                                            Office Name <div class="dropdown">
                                                                <svg  (click)="showHideFilteredDropdown('officeName')"
                                                                    style="cursor:pointer;display: inline-block; float: left;background: #e5e5e5;border-radius: 5px;padding: 1px;/* margin-right: 3px; */margin-left: 6px;"
                                                                    version="1.1" viewBox="0 0 24 24"
                                                                    xml:space="preserve"
                                                                    xmlns="http://www.w3.org/2000/svg"
                                                                    xmlns:xlink="http://www.w3.org/1999/xlink"
                                                                    width="20" fill="#d88627">
                                                                    <style type="text/css">
                                                                        .st0 {
                                                                            opacity: 0.2;
                                                                            fill: none;
                                                                            stroke: #000000;
                                                                            stroke-width: 5.000000e-02;
                                                                            stroke-miterlimit: 10;
                                                                        }
                                                                    </style>
                                                                    <g id="grid_system"></g>
                                                                    <g id="_icons">
                                                                        <path
                                                                            d="M4,17h8.1c0.4,1.7,2,3,3.9,3s3.4-1.3,3.9-3H20c0.6,0,1-0.4,1-1s-0.4-1-1-1h-0.1c-0.4-1.7-2-3-3.9-3s-3.4,1.3-3.9,3H4 c-0.6,0-1,0.4-1,1S3.4,17,4,17z M16,14c1.1,0,2,0.9,2,2s-0.9,2-2,2s-2-0.9-2-2S14.9,14,16,14z">
                                                                        </path>
                                                                        <path
                                                                            d="M4,9h0.1c0.4,1.7,2,3,3.9,3s3.4-1.3,3.9-3H20c0.6,0,1-0.4,1-1s-0.4-1-1-1h-8.1c-0.4-1.7-2-3-3.9-3S4.6,5.3,4.1,7H4 C3.4,7,3,7.4,3,8S3.4,9,4,9z M8,6c1.1,0,2,0.9,2,2s-0.9,2-2,2S6,9.1,6,8S6.9,6,8,6z">
                                                                        </path>
                                                                    </g>
                                                                </svg>
                                                                <div class="dropdown-menu filter-dropdown-menu" (mouseleave)="onMouseLeave($event)"
                                                                    *ngIf="showFilteredDropdown.officeName">
                                                                    <div class="clearClose">
                                                                        <label class="mx-1">
                                                                            <input type="checkbox"
                                                                                [checked]="isFilterAllSelected.officeName"
                                                                                value="selectAll"
                                                                                (change)="selectAll($event,'officeName')">
                                                                            {{isFilterAllSelected.officeName ? 'Clear
                                                                            All':'Select All'}}</label>
                                                                        <button
                                                                            (click)="showFilteredDropdown.officeName=false;"
                                                                            type="button" class="close"
                                                                            data-dismiss="modal"
                                                                            aria-label="Close"><span>&times;</span></button>
                                                                    </div>
                                                                    <ng-container *ngFor="let data of this.filteredOfficeName">
                                                                        <label class="mx-1">
                                                                            <input type="checkbox" checked="true"
                                                                            [(ngModel)]="data.checked"
                                                                                value="{{data.name}}"
                                                                                (change)="filterOfficeName($event,'officeName')">
                                                                            {{data.name}}
                                                                        </label>
                                                                    </ng-container>
                                                                </div>
                                                            </div><span class="sorting">
                                                            <a href="javascript:void(0);" class="arrow-up"
                                                                [ngClass]="{'selected': !isSorted['officeName']}"
                                                                (click)="sortData(filteredItems,'officeName','asc','string'); isSorted['officeName'] = false"></a>
                                                            <a href="javascript:void(0);" class="arrow-down"
                                                                [ngClass]="{'selected': isSorted['officeName']}"
                                                                (click)="sortData(filteredItems,'officeName','desc','string');isSorted['officeName'] = true"></a>
                                                        </span>                                                         
                                                        </div>
                                                    </th>
                                                    <th colspan="6" >
                                                        <div class="dFlex">
                                                        Claim ID <span class="sorting">
                                                            <a href="javascript:void(0);" class="arrow-up"
                                                                [ngClass]="{'selected': !isSorted['claimId']}"
                                                                (click)="sortData(filteredItems,'claimId','asc','number'); isSorted['claimId'] = false"></a>
                                                            <a href="javascript:void(0);" class="arrow-down"
                                                                [ngClass]="{'selected': isSorted['claimId']}"
                                                                (click)="sortData(filteredItems,'claimId','desc','number');isSorted['claimId'] = true"></a>
                                                        </span>
                                                        </div>
                                                    </th>
                                                    <th colspan="6">
                                                        <div class="dFlex">  
                                                            Upload Date <span class="sorting">
                                                            <a href="javascript:void(0);" class="arrow-up"
                                                                [ngClass]="{'selected': !isSorted['createdDate']}"
                                                                (click)="sortData(filteredItems,'createdDate','asc','dateOnly'); isSorted['createdDate'] = false"></a>
                                                            <a href="javascript:void(0);" class="arrow-down"
                                                                [ngClass]="{'selected': isSorted['createdDate']}"
                                                                (click)="sortData(filteredItems,'createdDate','desc','dateOnly');isSorted['createdDate'] = true"></a>
                                                            </span>
                                                        </div>
                                                    </th>
                                                    <th colspan="6" style="min-width: 170px;">
                                                        <div class="dFlex">  
                                                        Issue due to which Claim could not be Uploaded <span class="sorting">
                                                            <a href="javascript:void(0);" class="arrow-up"
                                                                [ngClass]="{'selected': !isSorted['issue']}"
                                                                (click)="sortData(filteredItems,'issue','asc','string'); isSorted['issue'] = false"></a>
                                                            <a href="javascript:void(0);" class="arrow-down"
                                                                [ngClass]="{'selected': isSorted['issue']}"
                                                                (click)="sortData(filteredItems,'issue','desc','string');isSorted['issue'] = true"></a>
                                                            </span>
                                                        </div>
                                                    </th>
                                                    <th colspan="6">
                                                        <div class="dFlex">  
                                                        Source <span class="sorting">
                                                            <a href="javascript:void(0);" class="arrow-up"
                                                                [ngClass]="{'selected': !isSorted['source']}"
                                                                (click)="sortData(filteredItems,'source','asc','string'); isSorted['source'] = false"></a>
                                                            <a href="javascript:void(0);" class="arrow-down"
                                                                [ngClass]="{'selected': isSorted['source']}"
                                                                (click)="sortData(filteredItems,'source','desc','string');isSorted['source'] = true"></a>
                                                            </span>
                                                        </div>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr *ngFor="let lg of filteredItems;let idx=index;">
                        
                                                    <td colspan="6">{{lg.officeName}}</td>
                                                    <td colspan="6">{{lg.claimId}}</td>
                                                    <td colspan="6">{{lg.createdDate | date:'MMM dd, YYYY HH:mm:ss'}}</td>
                                                    <td colspan="6">{{lg.issue}}</td>
                                                    <td colspan="6">{{lg.source}}</td>
                                                    
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
            
    </div>
    </div>
    </div>
    </div>
</div>
</div>
</div>
</div>
</div>
