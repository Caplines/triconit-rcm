<div>
    <app-header-component></app-header-component>
<br><br><br><br>
<ng-container *ngIf="alert.showAlertPopup">
    <div class="alert alert-info alert-dismissible fade show my-3 text-center" role="alert">
        <strong>{{alert.alertMsg}}</strong>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close" (click)="alert.showAlertPopup=false;">
            <span aria-hidden="true" >&times;</span>
        </button>
    </div>
</ng-container>
  <br><br>
<ng-container *ngIf="userRole != 'ROLE_ADMIN' ">
    <label for="changePass">Change User Password</label>
    <input type="password" [(ngModel)]="user.changedPassword">
    <button type="button" (click)="changePassword()">Change Password</button>
</ng-container>

<br><br><br>



<ng-container *ngIf="userRole == 'ROLE_ADMIN' ">
    <label for="findUser">Find User By Email: </label>
    <input type="text" [(ngModel)]="user.email">
    <button type="button" (click)="findUser()">Find</button>
    <ng-container *ngIf="showActionPopup">
        <select (change)="userAction($event)">
            <option selected="true" hidden="true">Action</option>
            <option value="changePass">Change Password</option>
            <option value="status" *ngIf="this.user.uuid !== userName">Enable / Disable Status</option>
        </select>
    </ng-container>

    <br><br><br>

    <ng-container *ngIf="user.showChangePassword">
        <label for="changepass">Change Password</label>
        <input type="text" [(ngModel)]="user['changedPassword']">
        <button type="button" (click)="changePassword()">Change Password</button>
    </ng-container>

    <br><br><br>

    <ng-container *ngIf="user.showStatus">
        <label for="status">Enable Disable Status</label>
        Enable : <input type="radio" [checked]="user.active == 1" name="status" (change)="updateSingleUserStatus(1)"> 
        Disabled : <input type="radio" [checked]="user.active == 0" name="status" (change)="updateSingleUserStatus(0)">
    </ng-container>

    <hr>

    <button type="button" class="btn btn-outline-primary" (click)="findAllUser(pageNumber)">Find All User</button>
    <ng-container *ngIf="allUser.length != 0">
        <table class="table table-border text-center" id="table">
            <tr class="thead-dark">  
            <th>Full Name</th>
            <th>Status</th>
        </tr>
        <ng-container *ngFor="let user of allUser;let idx= index">
            <tr *ngIf="userName != user.email">
                <td scope="col">{{user.fullName}}</td>
                <td scope="col"> &nbsp;&nbsp;&nbsp;
                     Enable : <input type="radio" [checked]="user.active == 1" name="status_{{idx}}" (change)="changeUserStatus(user.uuid,1)"> 
                   Disabled : <input type="radio" [checked]="user.active == 0" name="status_{{idx}}" (change)="changeUserStatus(user.uuid,0)">
                </td>
            </tr>
        </ng-container>
    </table>
</ng-container>
    <ng-container *ngIf="allUser.length != 0">
        <div class="container d-flex justify-content-between">
            <button type="button" class="btn btn-warning" (click)="updateAlUserStatus()" [disabled]="this.userStatusArray.userActiveStatus.length === 0">Update Status</button>
            <button type="button" class="btn btn-warning"  (click)="loadMoreData()" [disabled]="!hasNext">Load More Data</button>
        </div>
    </ng-container>

</ng-container>
</div>
