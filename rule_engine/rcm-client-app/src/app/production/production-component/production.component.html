
     <div class="right-container">
        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-12 pt-3">
                    <h2 class="page-heading">Production</h2>
                    <div class="main-container">
                        <div class="detail-box">
                            <div class="detail-box-form">
                                <div class="form-row withoutLink">
                                    <div class="date-range-box">
                                        <label>Select Date Range :</label>
                                        <input type="date"  class="form-control" #startDate id="sDate">
                                        <input type="date"  #endDate class="form-control" id="eDate">
                                    </div>

                                    <div class="table-responsive">
                                        <table class="table table-striped table-wrapper-scroll-y table-inner-scrollbar">
                                            <thead>
                                                <tr>

                                                    <th>Associate Name</th>
                                                    <th>Total Production</th>
                                                    <th>Average Production (Per Day)</th>
                                                </tr>
                                            </thead>
                                            <tbody>                                               
                                                <tr class="totalRow">
                                                    <td>Total</td>
                                                    <td>{{total}}</td>
                                                    <td>{{days}}</td>
                                                </tr>
                                                <ng-container *ngFor="let data of productionData;">
                                                <tr>
                                                    <td>{{data.fname}}</td>
                                                    <td>{{data.total}}</td>
                                                    <td>{{data.days}}</td>
                                                </tr>
                                            </ng-container>
                                            </tbody>
                                        </table>
                                    </div>
                                    
                                </div>
                            
                                <div  class="text-center" >
                                    <button type="button" class="btn btn-secondary" (click)="save(startDate.value,endDate.value)">Fetch</button>
                                </div>
              
                                    </div>
                                </div>

                            </div>
                        </div>
                        
                    </div>
                </div>
                
            </div>
