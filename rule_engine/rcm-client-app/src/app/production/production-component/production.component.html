<div class="right-container">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12 pt-3">
                <!-- <h2 class="page-heading">Production</h2> -->
                <div class="mt-3 text-right">
                    <button type="button" class="icon-btn" (click)="downloadPdf()" [disabled]="productionData.length==0 || loader.exportPDFLoader">
                        <img src="../../assets/img/pdf.png" /></button><span *ngIf="loader.exportPDFLoader"
                        class="spinner-border text-danger mx-1"></span>
                        <button type="button" class="icon-btn" (click)="exportToCsv()" [disabled]="productionData.length==0">
                            <img src="../../assets/img/xls.png" /></button><span *ngIf="loader.exportCSVLoader"
                            class="spinner-border text-success mx-1"></span>
                </div>
                <div class="main-container">
                    <div class="detail-box">
                        <div class="detail-box-form">
                            <div class="form-row withoutLink">
                                <div class="date-range-box">
                                    <label>Select Date Range </label>
                                    <input type="date" (change)="selectDate($event,'start')" class="form-control" id="sDate">
                                    <input type="date" (change)="selectDate($event,'end')" class="form-control" id="eDate">
                                    <button  [ngClass]="{'disabled':!selectedDate.startDate || !selectedDate.endDate || !fetchbtnDisable,'btn-success':selectedDate.startDate && selectedDate.endDate}" type="button" class="btn rangeBtn"
                                    (click)="save()"><span *ngIf="loader.fetch" class="spinner-grow spinner-grow-sm" role="status" aria-hidden="true"></span>Submit</button>
                                    <!-- <app-date-range></app-date-range> -->
                                </div>

                                <div class="table-responsive">
                                    <table class="table table-striped table-wrapper-scroll-y table-inner-scrollbar" id="table" *ngIf="productionData.length>0">
                                        <thead>
                                            <tr>
                                                <th>Client</th>
                                                <th>Associate Name</th>
                                                <th>Total Production</th>
                                                <th>      <div class="dFlex">Average Production (Per Day)
                                                    <span class="sorting">
                                                        <a href="javascript:void(0);" class="arrow-up"
                                                            [ngClass]="{'selected': !isSorted['days']}"
                                                            (click)="sortData(productionData,'days','asc','number'); isSorted['days'] = false"></a>
                                                        <a href="javascript:void(0);" class="arrow-down"
                                                            [ngClass]="{'selected': isSorted['days']}"
                                                            (click)="sortData(productionData,'days','desc','number');isSorted['days'] = true"></a>
                                                    </span>
                                                     </div> 
                                                   
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr *ngIf="loader.showLoader"><td colspan="8" class="text-center"><span class="loader-data"></span> </td></tr>
                                            <ng-container *ngIf="!loader.showLoader">
                                                <tr class="totalRow">
                                                    <td>Total</td>
                                                    <td></td>
                                                <td>{{total |number}}</td>
                                                <td>{{days |number}}</td>
                                            </tr>
                                            
                                            <ng-container *ngFor="let data of productionData;">
                                                <tr >
                                                    <td>{{data.companyName}}</td>
                                                    <td>{{data.fname}} {{data.lname}}</td>
                                                    <td>{{data.total | number}}</td>
                                                    <td>{{data.days | number}}</td>
                                                </tr>
                                            </ng-container>
                                        </ng-container>
                                        </tbody>
                                       
                                    </table>
                                </div>
                            </div>
                            <ng-container *ngIf="productionData.length==0 && isDataAvailable" >
                                <div class="text-center mt-5">
                                    <h5 class="text-light bg-secondary p-1"> No Data Available!</h5>
                                </div>
                            </ng-container>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>
