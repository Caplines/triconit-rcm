# RCM local only: serve Angular app and proxy backend API. No SSL, no prod.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    send_timeout ${NGINX_SEND_TIMEOUT};

    # Root -> Angular app
    location = / {
        try_files /index.html =404;
    }

    # Static assets (Angular bundles, images, fonts)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|html)$ {
        try_files $uri =404;
        add_header Cache-Control "no-store, max-age=0";
    }

    # Angular SPA routes – serve index.html so client-side routing works (including on refresh)
    location ~* ^/(login|register|user-setting|tool-update|manage-office|claim-assignment|users-status|manage-client|update-pass|production|list-of-claims|all-pendency|other-teams-work|search-claims|manage-section|reconciliation|unopenedclaim)(/|$) {
        try_files /index.html =404;
    }
    location ~* ^/billing-claims/ {
        try_files /index.html =404;
    }
    location ~* ^/tool-update/issue-claims {
        try_files /index.html =404;
    }

    # API: client calls same origin /api/v1/* → nginx strips prefix and forwards to backend
    location ^~ /api/v1/ {
        rewrite ^/api/v1/(.*)$ /$1 break;
        proxy_pass http://rcm-backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout ${PROXY_CONNECT_TIMEOUT};
        proxy_send_timeout ${PROXY_SEND_TIMEOUT};
        proxy_read_timeout ${PROXY_READ_TIMEOUT};
    }

    # SPA fallback (unknown paths → index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt { log_not_found off; access_log off; }
}
