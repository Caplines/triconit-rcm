# HTTP → HTTPS redirect
server {
    listen 80;
    server_name caplinedentalbilling.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name caplinedentalbilling.com;

    ssl_certificate /etc/letsencrypt/live/caplinedentalbilling.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caplinedentalbilling.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy all /api requests to the RCM backend
    # Spring Boot controllers are mapped at /api/... so no path rewrite needed
    location ^~ /api/ {
        proxy_pass http://rcm-backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Serve Angular static files (must be after API proxying)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for static assets in production
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
}
