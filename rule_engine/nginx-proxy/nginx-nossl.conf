# Reverse proxy – HTTP only (use before certbot has been run)
# Routes by domain to each app's nginx container on the shared-proxy network.
# After getting SSL certs, switch compose to mount nginx-ssl.conf instead.

server {
    listen 80;
    server_name ${RE_DOMAIN};

    location / {
        proxy_pass http://ruleengine-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name ${RCM_DOMAIN};

    location / {
        proxy_pass http://rcm-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
