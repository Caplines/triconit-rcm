# Reverse proxy – HTTP only (before certbot has been run)
#
# Uses Docker's internal DNS resolver so upstream hosts are resolved at
# request time, not at startup.  Nginx starts even if one app is not
# running — requests to the missing app return 502.
#
# After getting SSL certs, switch to nginx-ssl.conf (set NGINX_CONF in .env).

server {
    listen 80;
    server_name ${RE_SERVER_NAME};

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_re ruleengine-frontend;
        proxy_pass http://$upstream_re:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name ${RCM_SERVER_NAME};

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_rcm rcm-frontend;
        proxy_pass http://$upstream_rcm:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
