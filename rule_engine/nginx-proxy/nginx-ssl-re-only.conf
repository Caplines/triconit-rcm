# Reverse proxy – HTTPS – RuleEngine ONLY
# Set NGINX_CONF=nginx-ssl-re-only.conf in .env.
#
# Uses Docker DNS lazy resolution so nginx starts even if the app
# container isn't running yet (returns 502 until it comes up).
#
# certbot certonly --standalone -d $RE_DOMAIN

server {
    listen 80;
    server_name ${RE_SERVER_NAME};
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ${RE_SERVER_NAME};

    ssl_certificate     /etc/letsencrypt/live/${RE_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${RE_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_re ruleengine-frontend;
        proxy_pass http://$upstream_re:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
