# Reverse proxy – HTTPS – RuleEngine ONLY
# Use this config when deploying only the Rule Engine without RCM.
#
# In docker-compose.proxy.yml, change the volume mount to point to this file:
#   - ./nginx-proxy/nginx-ssl-re-only.conf:/etc/nginx/templates/default.conf.template:ro

server {
    listen 80;
    server_name ${RE_DOMAIN};
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ${RE_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${RE_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${RE_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://ruleengine-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
