# Reverse proxy – HTTPS – RCM ONLY
# Set NGINX_CONF=nginx-ssl-rcm-only.conf in .env.
#
# Uses Docker DNS lazy resolution so nginx starts even if the app
# container isn't running yet (returns 502 until it comes up).
#
# certbot certonly --standalone -d $RCM_DOMAIN

server {
    listen 80;
    server_name ${RCM_SERVER_NAME};
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ${RCM_SERVER_NAME};

    ssl_certificate     /etc/letsencrypt/live/${RCM_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${RCM_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s;

    send_timeout 1800s;
    client_header_timeout 1800s;
    client_body_timeout 1800s;

    location / {
        set $upstream_rcm rcm-frontend;
        proxy_pass http://$upstream_rcm:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }
}
