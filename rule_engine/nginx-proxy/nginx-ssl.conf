# Reverse proxy – HTTPS (use after certbot has issued certs for both domains)
#
# certbot certonly --standalone -d testing.ruleengine.caplineservices.in
# certbot certonly --standalone -d testing.rcm.caplineservices.in
# (stop the proxy first so port 80 is free for certbot standalone)
#
# Then in docker-compose.proxy.yml change the volume mount from nginx-nossl.conf to nginx-ssl.conf
# and run: docker compose -f docker-compose.proxy.yml up -d --force-recreate nginx-proxy

# HTTP → HTTPS redirect for all domains
server {
    listen 80;
    server_name testing.ruleengine.caplineservices.in testing.rcm.caplineservices.in;
    return 301 https://$host$request_uri;
}

# RuleEngine
server {
    listen 443 ssl;
    server_name testing.ruleengine.caplineservices.in;

    ssl_certificate     /etc/letsencrypt/live/testing.ruleengine.caplineservices.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testing.ruleengine.caplineservices.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://ruleengine-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# RCM
server {
    listen 443 ssl;
    server_name testing.rcm.caplineservices.in;

    ssl_certificate     /etc/letsencrypt/live/testing.rcm.caplineservices.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testing.rcm.caplineservices.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://rcm-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
