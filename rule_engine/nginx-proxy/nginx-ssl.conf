# Reverse proxy – HTTPS (use after certbot has issued certs for both domains)
#
# certbot certonly --standalone -d $RE_DOMAIN
# certbot certonly --standalone -d $RCM_DOMAIN
# (stop the proxy first so port 80 is free for certbot standalone)
#
# Then in docker-compose.proxy.yml change the volume mount from nginx-nossl.conf to nginx-ssl.conf
# and run: docker compose -f docker-compose.proxy.yml up -d --force-recreate nginx-proxy

# HTTP → HTTPS redirect for all domains
server {
    listen 80;
    server_name ${RE_DOMAIN} ${RCM_DOMAIN};
    return 301 https://$host$request_uri;
}

# RuleEngine
server {
    listen 443 ssl;
    server_name ${RE_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${RE_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${RE_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://ruleengine-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# RCM
server {
    listen 443 ssl;
    server_name ${RCM_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${RCM_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${RCM_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://rcm-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
