# Reverse proxy – HTTPS (both apps)
#
# Uses Docker's internal DNS resolver so upstream hosts are resolved at
# request time, not at startup.  This means nginx starts even if one of
# the apps is not running — requests to the missing app return 502.
#
# Requires SSL certs for BOTH domains (see certbot commands below).
# If you only have a cert for one domain, use nginx-ssl-re-only.conf
# or nginx-ssl-rcm-only.conf instead (set NGINX_CONF in .env).
#
# certbot certonly --standalone -d $RE_DOMAIN
# certbot certonly --standalone -d $RCM_DOMAIN

# HTTP → HTTPS redirect for all domains
server {
    listen 80;
    server_name ${RE_SERVER_NAME} ${RCM_SERVER_NAME};
    return 301 https://$host$request_uri;
}

# RuleEngine
server {
    listen 443 ssl;
    server_name ${RE_SERVER_NAME};

    ssl_certificate     /etc/letsencrypt/live/${RE_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${RE_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_re ruleengine-frontend;
        proxy_pass http://$upstream_re:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}

# RCM
server {
    listen 443 ssl;
    server_name ${RCM_SERVER_NAME};

    ssl_certificate     /etc/letsencrypt/live/${RCM_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${RCM_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_rcm rcm-frontend;
        proxy_pass http://$upstream_rcm:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
