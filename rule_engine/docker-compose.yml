services:
  # Spring Boot Backend
  # EagleSoft SSL: with ES_SSL_CLIENT_TRUSTALL=true (below) no certs needed. For production set trustAll=false and mount certs/ – see DEPLOYMENT.md.
  backend:
    build:
      context: ..
      dockerfile: rule_engine/ruleengine/Dockerfile
    container_name: ruleengine-backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    ports:
      - "8081:8080"  # Map to 8081 to avoid conflict with other services
    expose:
      - "8080"  # Internal port for nginx to access
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - ES_SSL_CLIENT_TRUSTALL=${ES_SSL_CLIENT_TRUSTALL:-false}
      - JAVA_OPTS=${JAVA_OPTS:--Xms512m -Xmx2048m -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/opt/project/tricon/log/heapdump.hprof}
    deploy:
      resources:
        limits:
          memory: 3072m
    volumes:
      - /opt/project/tricon/files:/opt/project/tricon/files
      - /opt/project/tricon/log:/opt/project/tricon/log
      - ${CERTS_PATH:-./certs}:/opt/project/tricon/client:ro
      - /opt/project/tricon/chrome:/opt/project/tricon/chrome
      
    networks:
      - ruleengine-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Angular Frontend (Nginx)
  frontend:
    build:
      context: ./ruleengine-client-app
      dockerfile: Dockerfile
      args:
        ENV: prod  # Use 'local' for development, 'prod' for production
    container_name: ruleengine-frontend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      - RE_DOMAIN=${RE_DOMAIN}
      - RE_SERVER_NAME=${RE_SERVER_NAME}
      - PROXY_CONNECT_TIMEOUT=${PROXY_CONNECT_TIMEOUT:-60s}
      - PROXY_SEND_TIMEOUT=${PROXY_SEND_TIMEOUT:-1800s}
      - PROXY_READ_TIMEOUT=${PROXY_READ_TIMEOUT:-1800s}
      - NGINX_SEND_TIMEOUT=${NGINX_SEND_TIMEOUT:-1800s}
    # No host port binding – nginx-proxy (docker-compose.proxy.yml) owns 80/443
    # and routes traffic here via the shared-proxy network.
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - ruleengine-network
      - shared-proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ruleengine-network:
    driver: bridge  
  shared-proxy:
    external: true

