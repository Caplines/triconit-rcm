services:
  # Spring Boot Backend
  # EagleSoft SSL: mount ./certs (cacerts.jks + keystore.jks with ES server cert) – see DEPLOYMENT.md.
  backend:
    build:
      context: ..
      dockerfile: rule_engine/ruleengine/Dockerfile
    container_name: ruleengine-backend
    restart: unless-stopped
    ports:
      - "8081:8080"  # Map to 8081 to avoid conflict with other services
    expose:
      - "8080"  # Internal port for nginx to access
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # Override database settings if needed
      # - SPRING_JPA1_PROPERTIES_HIBERNATE_CONNECTION_URL=jdbc:mysql://your-db:3306/rule_engine
      # - SPRING_JPA1_PROPERTIES_HIBERNATE_CONNECTION_USERNAME=your_user
      # - SPRING_JPA1_PROPERTIES_HIBERNATE_CONNECTION_PASSWORD=your_password
    volumes:
      # Persist application data
      - backend-files:/opt/project/tricon/files
      - backend-logs:/opt/project/tricon/log
      # EagleSoft SSL: certs/ must contain cacerts.jks and keystore.jks (see DEPLOYMENT.md).
      # Path is relative to this compose file so it works when run from repo root or rule_engine/.
      - ${CERTS_PATH:-./certs}:/opt/project/tricon/client:ro
      - backend-chrome:/opt/project/tricon/chrome
      # backend-xml volume removed: XSLT templates are baked into the image at /opt/xslt,
      # and temp XML output uses /tmp/ruleengine/xml/ (no volume needed)
      
    networks:
      - ruleengine-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Angular Frontend (Nginx)
  frontend:
    build:
      context: ./ruleengine-client-app
      dockerfile: Dockerfile
      args:
        ENV: prod  # Use 'local' for development, 'prod' for production
    container_name: ruleengine-frontend
    restart: unless-stopped
    # No host port binding – nginx-proxy (docker-compose.proxy.yml) owns 80/443
    # and routes traffic here via the shared-proxy network.
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - ruleengine-network
      - shared-proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ruleengine-network:
    driver: bridge  
  shared-proxy:
    external: true

volumes:
  backend-files:
  backend-logs:
  backend-chrome:
