# RCM – local only (no prod/SSL). One command to run app + UI.
#
#  Frontend: http://localhost:4201   (nginx serves Angular, proxies API to backend)
#  Backend:  http://localhost:8082   (Spring Boot, for Postman etc.)
#
#  Run:   docker compose -f docker-compose.rcm.local.yml up --build
#  If only .env changed: docker compose -f docker-compose.rcm.local.yml up -d --force-recreate rcm-backend
#  Stop:  docker compose -f docker-compose.rcm.local.yml down
#
#  DB: application-docker.properties (same RDS as RuleEngine).
#
#  No host bind mounts for /opt/project data paths — named volumes only (see bottom).
#  Prod compose files use host/server paths; local uses Docker-managed volumes.

services:
  # Spring Boot backend (locally built image)
  rcm-backend:
    build:
      context: .
      dockerfile: rcm/Dockerfile
    image: rule_engine-rcm-backend:local
    container_name: rcm-backend
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    ports:
      - "8082:8081"
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DEBUG_AUTO_RULES=${DEBUG_AUTO_RULES:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - rcm_local_tricon_files:/opt/project/tricon/files
      - rcm_local_tricon_log:/opt/project/tricon/log
      - rcm_local_attachments:/opt/project/attachments
      - rcm_local_pdf:/opt/project/pdf
      - rcm_local_xml:/opt/project/xml
    networks:
      - rcm-network

  # Angular frontend – nginx (local config only, proxies API to backend)
  rcm-frontend:
    build:
      context: ./rcm-client-app
      dockerfile: Dockerfile
      args:
        ENV: local
        BUILD_CONFIG: docker
    container_name: rcm-frontend
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    ports:
      - "4201:80"  # Port 4201 to avoid conflict with ruleengine-frontend on 4200
    environment:
      - PROXY_CONNECT_TIMEOUT=${PROXY_CONNECT_TIMEOUT:-60s}
      - PROXY_SEND_TIMEOUT=${PROXY_SEND_TIMEOUT:-1800s}
      - PROXY_READ_TIMEOUT=${PROXY_READ_TIMEOUT:-1800s}
      - NGINX_SEND_TIMEOUT=${NGINX_SEND_TIMEOUT:-1800s}
    depends_on:
      - rcm-backend
    networks:
      - rcm-network

networks:
  rcm-network:
    driver: bridge

volumes:
  rcm_local_tricon_files:
  rcm_local_tricon_log:
  rcm_local_attachments:
  rcm_local_pdf:
  rcm_local_xml:

