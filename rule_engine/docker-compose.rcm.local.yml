# RCM – local only (no prod/SSL). One command to run app + UI.
#
#  Frontend: http://localhost:4201   (nginx serves Angular, proxies API to backend)
#  Backend:  http://localhost:8082   (Spring Boot, for Postman etc.)
#
#  Run:   docker compose -f docker-compose.rcm.local.yml up --build
#  Stop:  docker compose -f docker-compose.rcm.local.yml down
#
#  DB: application-docker.properties (same RDS as RuleEngine).

services:
  # Spring Boot backend (source mounted, mvn spring-boot:run)
  rcm-backend:
    image: eclipse-temurin:8-jdk
    container_name: rcm-backend
    working_dir: /app
    ports:
      - "8082:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./rcm:/app                     # Mount source for live development
      - ~/.m2:/root/.m2                # Reuse local Maven cache for faster builds
      - rcm-backend-files:/opt/project/tricon/files
      - rcm-backend-logs:/opt/project/tricon/log
      - rcm-backend-attachments:/opt/project/attachments
      - rcm-backend-pdf:/opt/project/pdf
      - rcm-backend-xml:/opt/project/xml
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y maven &&
      mvn spring-boot:run
      "
    networks:
      - rcm-network

  # Angular frontend – nginx (local config only, proxies API to backend)
  rcm-frontend:
    build:
      context: ./rcm-client-app
      dockerfile: Dockerfile
      args:
        ENV: local
        BUILD_CONFIG: docker
    container_name: rcm-frontend
    ports:
      - "4201:80"  # Port 4201 to avoid conflict with ruleengine-frontend on 4200
    depends_on:
      - rcm-backend
    networks:
      - rcm-network

networks:
  rcm-network:
    driver: bridge

volumes:
  rcm-backend-files:
  rcm-backend-logs:
  rcm-backend-attachments:
  rcm-backend-pdf:
  rcm-backend-xml:
