# Reverse proxy – owns host ports 80 and 443, routes by domain.
#
# SETUP (one-time, on the server):
#   docker network create shared-proxy
#
# RUN (before SSL):
#   docker compose -f docker-compose.proxy.yml up -d
#
# GET SSL (certbot):
#   docker compose -f docker-compose.proxy.yml down          # free port 80
#   certbot certonly --standalone -d testing.ruleengine.caplineservices.in
#   certbot certonly --standalone -d testing.rcm.caplineservices.in
#   # then edit volume below: nginx-nossl.conf  →  nginx-ssl.conf
#   docker compose -f docker-compose.proxy.yml up -d
#
# STOP:
#   docker compose -f docker-compose.proxy.yml down

services:
  nginx-proxy:
    image: nginx:1.21-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  
    networks:
      - shared-proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  shared-proxy:
    external: true  