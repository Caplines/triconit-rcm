# Reverse proxy – owns host ports 80 and 443, routes by domain.
#
# SETUP (one-time, on the server):
#   docker network create shared-proxy
#
# CONFIG SELECTION (set NGINX_CONF in .env):
#   nginx-ssl.conf           → Both apps, SSL (default – needs certs for both domains)
#   nginx-ssl-re-only.conf   → RuleEngine only, SSL (needs cert for RE domain only)
#   nginx-ssl-rcm-only.conf  → RCM only, SSL (needs cert for RCM domain only)
#   nginx-nossl.conf          → Both apps, HTTP only (before certbot)
#
# RUN:
#   docker compose -f docker-compose.proxy.yml up -d
#
# STOP:
#   docker compose -f docker-compose.proxy.yml down

services:
  nginx-proxy:
    image: nginx:1.21-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - RE_DOMAIN=${RE_DOMAIN}
      - RE_SERVER_NAME=${RE_SERVER_NAME}
      - RCM_DOMAIN=${RCM_DOMAIN}
      - RCM_SERVER_NAME=${RCM_SERVER_NAME}
      - PROXY_CONNECT_TIMEOUT=${PROXY_CONNECT_TIMEOUT:-60s}
      - PROXY_SEND_TIMEOUT=${PROXY_SEND_TIMEOUT:-1800s}
      - PROXY_READ_TIMEOUT=${PROXY_READ_TIMEOUT:-1800s}
      - NGINX_SEND_TIMEOUT=${NGINX_SEND_TIMEOUT:-1800s}
    volumes:
      - ./nginx-proxy/${NGINX_CONF:-nginx-ssl.conf}:/etc/nginx/templates/default.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  
    networks:
      - shared-proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  shared-proxy:
    external: true  
