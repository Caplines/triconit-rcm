# ============================================================
# RuleEngine — PRODUCTION
# Images pulled from Docker Hub. No builds happen here.
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# To update a single service:
#   docker compose -f docker-compose.prod.yml pull backend
#   docker compose -f docker-compose.prod.yml up -d --no-deps backend
# ============================================================

services:
  backend:
    image: ${DOCKER_HUB_REPO}:re-backend-${RE_VERSION:-latest}
    container_name: ruleengine-backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    ports:
      - "8081:8080"
    expose:
      - "8080"
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - ES_SSL_CLIENT_TRUSTALL=${ES_SSL_CLIENT_TRUSTALL:-false}
      # Default heap for ~4GB host with FE+BE; set JAVA_OPTS in .env to tune. Heap dump off by default.
      - JAVA_OPTS=${JAVA_OPTS:--Xms256m -Xmx1536m}
    deploy:
      resources:
        limits:
          memory: 2560m
    volumes:
      - /opt/project/tricon/files:/opt/project/tricon/files
      - /opt/project/tricon/log:/opt/project/tricon/log
      - ${CERTS_PATH:-./certs}:/opt/project/tricon/client:ro
      - /opt/project/tricon/chrome:/opt/project/tricon/chrome
    networks:
      - ruleengine-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ${DOCKER_HUB_REPO}:re-frontend-${RE_VERSION:-latest}
    container_name: ruleengine-frontend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      - RE_DOMAIN=${RE_DOMAIN}
      - RE_SERVER_NAME=${RE_SERVER_NAME}
      - PROXY_CONNECT_TIMEOUT=${PROXY_CONNECT_TIMEOUT:-60s}
      - PROXY_SEND_TIMEOUT=${PROXY_SEND_TIMEOUT:-1800s}
      - PROXY_READ_TIMEOUT=${PROXY_READ_TIMEOUT:-1800s}
      - NGINX_SEND_TIMEOUT=${NGINX_SEND_TIMEOUT:-1800s}
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - ruleengine-network
      - shared-proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ruleengine-network:
    driver: bridge
  shared-proxy:
    external: true
