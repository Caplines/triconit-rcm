spring.jpa.hibernate.ddl-auto=validate
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.jdbc-url=${DB_URL}
#pooling
spring.datasource.maximum-pool-size=20
spring.datasource.minimum-idle=2
spring.datasource.max-lifetime=120
spring.jpa.show-sql: true
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect

spring.mvc.pathmatch.matching-strategy = ANT_PATH_MATCHER
# Find Properties using spring.datasource.hikari and then Remove "hikari" to access Prop.
#spring.datasource.hikari.auto-commit =true


spring.datasource.hikari.connection-timeout=60000


#JPA poolling https://tomcat.apache.org/tomcat-7.0-doc/jdbc-pool.html#Common_Attributes

entitymanager.packagesToScan=com.tricon.rcm.db.entity
#Others
filter.log.enable=true

#jwt  
jwt.header=Authorization
jwt.headerC=c
jwt.headerT=t
jwt.headerR=r
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.route.authentication.path=/account/login
jwt.route.authentication.refresh=/refresh


spring.jpa.open-in-view=false
server.port=8081
#sec min hours
scheduler.startcron=${SCHEDULER_STARTCRON}
#(second (0-59))|(minute (0 - 59))|(hour (0 - 23))|(day of the month (1 - 31))|(month (1 - 12)|(or JAN-DEC)) (day of the week (0 - 7)) (0 or 7 is Sunday, or MON-SUN)
scheduler.posting.startcron=${SCHEDULER_POSTING_STARTCRON}
#Google Sheet related 
google.credential.folder=${GOOGLE_CREDENTIAL_FOLDER}
google.client.secret=${GOOGLE_CLIENT_SECRET_FILE}

#rule engine
               
rmc.auth.token=${RMC_AUTH_TOKEN}
rmc.pullclaimurl=${RCM_RULEENGINE_BASE_URL}/fetch-claims
rmc.pullInsuranceUrl=${RCM_RULEENGINE_BASE_URL}/fetch-insurance
rcm.pullremoteliteurl=${RCM_RULEENGINE_BASE_URL}/remote-lite-details
rcm.diagnosticurl=${RCM_RULEENGINE_BASE_URL}/diagnostic_check_for_rcm
rcm.ivfdataurl=${RCM_RULEENGINE_BASE_URL}/ivf-data-for-rcm
rcm.claimESdataurl=${RCM_RULEENGINE_BASE_URL}/claim-data-form-es
rcm.tpESdataurl=${RCM_RULEENGINE_BASE_URL}/tp-data-form-es
rcm.tpIdsESdataurl=${RCM_RULEENGINE_BASE_URL}/tp-ids-form-es
rcm.claimAppointmenturl=${RCM_RULEENGINE_BASE_URL}/claim-appointment-date
rcm.reconcillationquery=${RCM_RULEENGINE_BASE_URL}/reconcillation-query
rcm.dueBalquery=${RCM_RULEENGINE_BASE_URL}/duebal-query
#pagination
data.totalRecordperPage=30
data.archiveClaims.totalRecordperPage=300
data.searchClaims.totalRecordperPage=500
#Email Configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# TLS , port 587
spring.mail.properties.mail.smtp.starttls.enable=true

app.email.from=${EMAIL_FROM}

#send email enable/disable
app.email.userRegistration=true
app.email.forgotPassword=true
#google captcha credential

captcha.url=https://www.google.com/recaptcha/api/siteverify
captcha.secret.key=${CAPTCHA_SECRET_KEY}

#login path without captcha 
jwt.route.testing.authentication.path=/account/l_abc

#server
rcm.serverdomain=${RCM_SERVER_DOMAIN}
#xslt
rcm.xslt.path=${RCM_XSLT_PATH}
list_claim.xslt.file=${RCM_XSLT_PATH}/pdfformat_list_claim.xslt
claim.xslt.file=${RCM_XSLT_PATH}/claim.xslt
Issue_claim.xslt.file=${RCM_XSLT_PATH}/pdfformat_Issue_Claim.xslt
Claim_Details.xslt.file=${RCM_XSLT_PATH}/pdfformat_Claim_Details.xslt
Production.xslt.file=${RCM_XSLT_PATH}/pdfformat_Production_Data.xslt
Pendancy.xslt.file=${RCM_XSLT_PATH}/pdfformat_Pendancy_Data.xslt
All_Pendancy.xslt.file=${RCM_XSLT_PATH}/pdfformat_AllPendancy_Data.xslt
Tp_Plan_Link.xslt.file=${RCM_XSLT_PATH}/pdfformat_TpPlan_Data.xslt
Ivf_Link.xslt.file=${RCM_XSLT_PATH}/pdfformat_Ivf_Data.xslt
others_team.xslt.file=${RCM_XSLT_PATH}/pdfformat_others_team_work.xslt
search_claim.xslt.file=${RCM_XSLT_PATH}/pdfformat_search_claim.xslt
#save attachments
app.attachment.dir.path=${RCM_ATTACHMENT_PATH}
spring.servlet.multipart.max-file-size=100000000
spring.servlet.multipart.file-size-threshold=200000000
#EOBLINK
eoblink.folder=${RCM_EOBLINK_FOLDER}
