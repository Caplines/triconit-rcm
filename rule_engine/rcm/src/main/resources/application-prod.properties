spring.jpa.hibernate.ddl-auto=validate
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.jdbc-url=${DB_URL}
#pooling
spring.datasource.maximum-pool-size=20
spring.datasource.minimum-idle=2
spring.datasource.max-lifetime=120
spring.jpa.show-sql: true
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect

spring.mvc.pathmatch.matching-strategy = ANT_PATH_MATCHER
# Find Properties using spring.datasource.hikari and then Remove "hikari" to access Prop.
#spring.datasource.hikari.auto-commit =true


spring.datasource.hikari.connection-timeout=60000


#JPA poolling https://tomcat.apache.org/tomcat-7.0-doc/jdbc-pool.html#Common_Attributes

entitymanager.packagesToScan=com.tricon.rcm.db.entity
#Others
filter.log.enable=true

#jwt  
jwt.header=Authorization
jwt.headerC=c
jwt.headerT=t
jwt.headerR=r
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.route.authentication.path=/account/login
jwt.route.authentication.refresh=/refresh


spring.jpa.open-in-view=false
server.port=8081
#sec min hours
scheduler.startcron=${SCHEDULER_STARTCRON}
#(second (0-59))|(minute (0 - 59))|(hour (0 - 23))|(day of the month (1 - 31))|(month (1 - 12)|(or JAN-DEC)) (day of the week (0 - 7)) (0 or 7 is Sunday, or MON-SUN)
scheduler.posting.startcron=${SCHEDULER_POSTING_STARTCRON}
