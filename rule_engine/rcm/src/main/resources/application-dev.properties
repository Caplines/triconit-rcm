#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=update
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.jdbc-url=${DB_URL}
#pooling
spring.datasource.maximum-pool-size=20
spring.datasource.minimum-idle=2
spring.datasource.max-lifetime=120
spring.jpa.show-sql: true
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect

spring.mvc.pathmatch.matching-strategy = ANT_PATH_MATCHER
# Find Properties using spring.datasource.hikari and then Remove "hikari" to access Prop.
#spring.datasource.hikari.auto-commit =true


spring.datasource.hikari.connection-timeout=60000


#JPA poolling https://tomcat.apache.org/tomcat-7.0-doc/jdbc-pool.html#Common_Attributes

entitymanager.packagesToScan=com.tricon.rcm.db.entity
#Others
filter.log.enable=true

#jwt  
jwt.header=Authorization
jwt.headerC=c
jwt.headerT=t
jwt.headerR=r

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:600000}
jwt.route.authentication.path=/account/login
jwt.route.authentication.refresh=/refresh


spring.jpa.open-in-view=false
server.port=8081

scheduler.startcron=${SCHEDULER_STARTCRON:0 17 22 * * *}

#(second (0-59))|(minute (0 - 59))|(hour (0 - 23))|(day of the month (1 - 31))|(month (1 - 12)|(or JAN-DEC)) (day of the week (0 - 7)) (0 or 7 is Sunday, or MON-SUN)
scheduler.posting.startcron=${SCHEDULER_POSTING_STARTCRON:0 17 23 * * *}
#Google Sheet related (service-account auth; google.credential.folder is kept for property binding but unused)
google.credential.folder=${GOOGLE_CREDENTIAL_FOLDER:E:/Project/Tricon/files}
google.client.secret=${GOOGLE_CLIENT_SECRET_FILE:E:/Project/Tricon/files/service_account.json}

#rule engine
rmc.auth.token=${RMC_AUTH_TOKEN}
rmc.pullclaimurl=${RCM_RULEENGINE_BASE_URL:http://localhost:8080}/fetch-claims
rmc.pullInsuranceUrl=${RCM_RULEENGINE_BASE_URL:http://localhost:8080}/fetch-insurance
rcm.pullremoteliteurl=${RCM_RULEENGINE_BASE_URL:http://localhost:8080}/remote-lite-details
rcm.diagnosticurl=${RCM_RULEENGINE_BASE_URL:http://localhost:8080}/diagnostic_check_for_rcm

rcm.ivfdataurl=${RCM_RULEENGINE_BASE_URL:http://localhost:8080}/ivf-data-for-rcm
rcm.claimESdataurl=${RCM_RULEENGINE_BASE_URL:http://localhost:8080}/claim-data-form-es
rcm.tpESdataurl=${RCM_RULEENGINE_BASE_URL:http://localhost:8080}/tp-data-form-es
rcm.tpIdsESdataurl=${RCM_RULEENGINE_BASE_URL:http://localhost:8080}/tp-ids-form-es
rcm.claimAppointmenturl=${RCM_RULEENGINE_BASE_URL:http://localhost:8080}/claim-appointment-date
rcm.reconcillationquery=${RCM_RULEENGINE_BASE_URL:http://localhost:8080}/reconcillation-query
rcm.dueBalquery=${RCM_RULEENGINE_BASE_URL:http://localhost:8080}/duebal-query
#pagination
data.totalRecordperPage=30
data.archiveClaims.totalRecordperPage=300
data.searchClaims.totalRecordperPage=10

#Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# TLS , port 587
spring.mail.properties.mail.smtp.starttls.enable=true

app.email.from=${EMAIL_FROM:support.rcmtool@caplineservices.com}

#send email enable/disable
app.email.userRegistration=false
app.email.forgotPassword=true

#google captcha credential

captcha.url=https://www.google.com/recaptcha/api/siteverify
captcha.secret.key=${CAPTCHA_SECRET_KEY}

#login path without captcha 
jwt.route.testing.authentication.path=/account/l_abc

