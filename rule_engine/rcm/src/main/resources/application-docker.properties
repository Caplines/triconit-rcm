# Docker local run – same RDS URL/credentials as RuleEngine
# Use this profile when running RCM in Docker so connection matches RuleEngine exactly.

spring.jpa.hibernate.ddl-auto=update
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.jdbc-url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.maximum-pool-size=20
spring.datasource.minimum-idle=2
spring.datasource.max-lifetime=120
spring.datasource.hikari.connection-timeout=60000
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER
spring.jpa.open-in-view=false

entitymanager.packagesToScan=com.tricon.rcm.db.entity
filter.log.enable=true

server.port=8081

# JWT
jwt.header=Authorization
jwt.headerC=c
jwt.headerT=t
jwt.headerR=r
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.route.authentication.path=/account/login
jwt.route.authentication.refresh=/refresh
jwt.route.testing.authentication.path=/account/l_abc

# RuleEngine URLs (when only RCM stack is up, use host; when both stacks up, use ruleengine-backend:8080)
rmc.pullclaimurl=${RCM_RULEENGINE_BASE_URL:http://host.docker.internal:8081}/fetch-claims
rmc.pullInsuranceUrl=${RCM_RULEENGINE_BASE_URL:http://host.docker.internal:8081}/fetch-insurance
rcm.pullremoteliteurl=${RCM_RULEENGINE_BASE_URL:http://host.docker.internal:8081}/remote-lite-details
rcm.diagnosticurl=${RCM_RULEENGINE_BASE_URL:http://host.docker.internal:8081}/diagnostic_check_for_rcm
rcm.ivfdataurl=${RCM_RULEENGINE_BASE_URL:http://host.docker.internal:8081}/ivf-data-for-rcm
rcm.claimESdataurl=${RCM_RULEENGINE_BASE_URL:http://host.docker.internal:8081}/claim-data-form-es
rcm.tpESdataurl=${RCM_RULEENGINE_BASE_URL:http://host.docker.internal:8081}/tp-data-form-es
rcm.tpIdsESdataurl=${RCM_RULEENGINE_BASE_URL:http://host.docker.internal:8081}/tp-ids-form-es
rcm.claimAppointmenturl=${RCM_RULEENGINE_BASE_URL:http://host.docker.internal:8081}/claim-appointment-date
rcm.reconcillationquery=${RCM_RULEENGINE_BASE_URL:http://host.docker.internal:8081}/reconcillation-query
rcm.dueBalquery=${RCM_RULEENGINE_BASE_URL:http://host.docker.internal:8081}/duebal-query

data.totalRecordperPage=30
data.archiveClaims.totalRecordperPage=300
data.searchClaims.totalRecordperPage=10

# Paths valid inside container (service-account auth; google.credential.folder is kept for property binding but unused)
google.credential.folder=${GOOGLE_CREDENTIAL_FOLDER}
google.client.secret=${GOOGLE_CLIENT_SECRET_FILE}
rcm.sheet.rcm-database-id=${RCM_SHEET_RCM_DATABASE_ID:1txTh07ssmXytBscroqVnbSRppeZjt8x1m391Hd1Fsr4}
rcm.sheet.rcm-database-sub-id=${RCM_SHEET_RCM_DATABASE_SUB_ID:0}
rcm.sheet.rcm-database-sub-name=${RCM_SHEET_RCM_DATABASE_SUB_NAME:Paste Data Here}
rcm.sheet.mapping-workbook-id=${RCM_SHEET_MAPPING_WORKBOOK_ID:1g9VtQVT5T0-Fp_beLSYhRIbUn-KBqP4TGmYuteMbsd4}
rcm.sheet.mapping-provider-tab=${RCM_SHEET_MAPPING_PROVIDER_TAB:Provider}
rcm.sheet.provider-schedule-id=${RCM_SHEET_PROVIDER_SCHEDULE_ID:1r1unO-L2wAB6zAEaKYzMEIUi1nG_F6wTzduzaXqiKAg}
rcm.sheet.service-validation-id=${RCM_SHEET_SERVICE_VALIDATION_ID:1Ba44zmvoNzNBPNaxGPUNVxUu_O41r7HAWq2hyZuCDJc}
rcm.sheet.service-validation-tab=${RCM_SHEET_SERVICE_VALIDATION_TAB:Service-Code based Validations}
rcm.sheet.credential-tracker-id=${RCM_SHEET_CREDENTIAL_TRACKER_ID:1QPfa8aEA5pcSWhGJQSX9R7CC-ZxVA-8_nvagjGAA4s4}
rcm.sheet.credential-tracker-anes-tab=${RCM_SHEET_CREDENTIAL_TRACKER_ANES_TAB:Anesthesia and First Dental Home}
rcm.sheet.credential-tracker-master-tab=${RCM_SHEET_CREDENTIAL_TRACKER_MASTER_TAB:Master Data}
