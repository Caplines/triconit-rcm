# App-level nginx – serves plain HTTP on port 80.
# SSL termination and HTTP→HTTPS redirect are handled by the nginx-proxy container.

server {
    listen 80;
    server_name ${RE_DOMAIN};

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 1800s matches stack default; hardcoded so long requests do not depend on envsubst/container env (nginx defaults are 60s).
    send_timeout 1800s;
    client_header_timeout 1800s;
    client_body_timeout 1800s;

    # ========== Backend routes (API) ==========
    # 1) New pattern: /api/v1/* → backend (strip prefix). Used by Angular (API_URL=/api/v1).
    location ^~ /api/v1/ {
        rewrite ^/api/v1/(.*)$ /$1 break;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }

    # 2) Legacy backend paths (no /api/v1 prefix). Used by legacy deployments and sheets.
    location ~ ^/(open/|admin/|admin1111/|account/|refresh|savedatatore|savedatatoreCheck|savedatatoreos|savedatatoreortho|queryivdatafromdb|queryivosdatafromdb|queryivorthodatafromdb|queryivdatafromdbTemp|queryivdatafromdbgoogle|queryivdatahistoryfromdbgoogle|queryivdatatopdf|queryivosdatatopdf|queryivorthodatatopdf|queryivdatatohtml|googleESReportReplication|queryrcmtoolclaimdata|queryrulesstatus|dumpOldIVFData|dumpOldIVFDataOtho11999555|report|reportcl|enreport|enreportcl|genereatePdf|genereatePdfSealant|genereatePdfSealantUI|fillupgsheet|rulereportdata|rulereportdataAllMess|generateTeamwiseExcel|googleReport|googleReport2|googleESReport|readDriveSuc|sharePointIni|writeData|xxxxx|validateTreatmentPlan|validateTreatmentPlanPreBatch|validateTreatmentPlanBatch|generateTreatmentId|diagnosticcheck|getTreatmentClaimData|appdebug/|fetch-claims|fetch-insurance|claim-appointment-date|reconcillation-query|diagnostic_check_for_rcm|remote-lite-details|ivf-data-for-rcm|claim-data-form-es|tp-data-form-es|tp-ids-form-es|duebal-query|user|resetpassword|getAllUsers|scrapsite|runsealantRules|scrapsiteud/|getsitenametoparsefulldata|getsitenametoparsefulldatalite|getsitedetailstoparsefulldata|parsefulldata|parseLitedata|validateparsefulldataOTP|parsefulldataProcessInfo|parsefulldataProcessInfostatus|getUserInputQuestionsAns|saveUserInput|\.well-known/)(.*)$ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }

    # ========== Frontend (Angular SPA) ==========
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
}
