<div *ngIf="showIvfData">
	<div class="close-btn">
		<a href="javascript:void(0)" (click)="closePopup()">
			<img src="assets/img/close-btn.png" alt="X" />
		</a>
	</div>	
	<div *ngFor="let key of arrayOfKeys" class="table-container">
		<h3 [innerHTML]="key"></h3>
		<table class="table table-bordered table-striped">
			<thead>
				<tr>
					<th>Rule Name</th>
					<th>Messages</th>
				</tr>
			</thead>
			<tbody>
				<tr *ngFor="let data of ivfmData[key]">
					<td><span [innerHTML]="data.ruleName"></span></td>
					<td><span [innerHTML]="data.message"></span></td>
				<tr>
			</tbody>						
		</table>
	</div>
</div>
