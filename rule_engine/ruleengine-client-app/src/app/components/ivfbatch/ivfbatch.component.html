
<div class="inner-bg">
	<div *ngIf="!showIvfData" class="container">
		<div class="row">
			<div class="col-sm-6 col-sm-offset-3 form-box">
				<div class="form-top">
					<div class="form-top-left">
						<h3 class="ivf-title">Enter Details for Validating Treatment Plans in Batch</h3>
					</div>
				</div>

				<div class="form-bottom">
					<form class="login-form" name="form"
						(ngSubmit)="f.form.valid && validateIVF()" #f="ngForm" novalidate>
						<!-- <div class="alert alert-danger" role="alert" *ngIf="errorMessage">{{errorMessage}}</div> -->
						<span id="reauth-email" class="reauth-email"></span>

						<div class="form-group"
							[ngClass]="{ 'has-error': f.submitted && !copyId.valid }">
							<label class="sr-only" for="treatmentPlanId">Treatment Plan Id & IV Id</label> <input type="text" 
								class="login-signup-form-field1 form-control"
								name="copyId" id="copyId"
								[(ngModel)]="ivfm.copyId" #copyId="ngModel"
								placeholder="Treatment Plan Id & IV Id" (paste)="onPaste($event)"/>
							<div *ngIf="f.submitted && !copyId.valid"
								class="error-msg">Please enter Treatment Plan Id's and Treatment Id's.</div>
						</div>

						<div class="form-group"
							[ngClass]="{ 'has-error': f.submitted && !treatmentPlanId.valid }">
							<label class="sr-only" for="treatmentPlanId">Treatment
								Plan Id</label> <textarea   rows="150" cols="15"
								class="login-signup-form-field1 form-control"
								name="treatmentPlanId" id="treatmentPlanId"
								[(ngModel)]="ivfm.treatmentPlanId" #treatmentPlanId="ngModel"
								placeholder="Treatment Plan Id : 1,2,3,4,5,6,7 " required ></textarea>
							<div *ngIf="f.submitted && !treatmentPlanId.valid"
								class="error-msg">Please enter Treatment Plan Id.</div>
						</div>

						<div class="form-group"
							[ngClass]="{ 'has-error': f.submitted && !ivfId.valid }">
							<label class="sr-only" for="ivfId">IVF Form Id</label> <textarea rows="150" cols="15"
								 class="login-signup-form-field1 form-control"
								name="ivfId" id="ivfId" [(ngModel)]="ivfm.ivfId"
								#ivfId="ngModel" placeholder="IV Id : 5,6,7,8,9 " required ></textarea>
							<div *ngIf="f.submitted && !ivfId.valid" class="error-msg">Please
								enter IVF Id.</div>
						</div>

						<div class="form-group" [ngClass]="{ 'has-error': f.submitted }">
							<label class="sr-only" for="officeId">Office Name</label> <select
								name="officeId" [(ngModel)]="ivfm.officeId"
								class="login-signup-form-field form-control" id="officeId">
								<option value="">Office Name...</option>
								<option *ngFor="let title of offices" [value]="title.uuid">{{title.name}}</option>
							</select>
							<div *ngIf="f.submitted && ivfm.officeId==''" class="error-msg">
								Office Name is required</div>
						</div>


						<p>
							<button [disabled]="showLoading" type="submit" class="btn">Validate Treatment Plans</button>
						</p>

						<div *ngIf="showLoading" class="loader"></div>

					</form>
				</div>
			</div>
		</div>

	</div>
	
	<app-ivfpopup *ngIf="showPopup" [ivfm]="ivfm" (emitToParent)="receiveChildrenEmitter($event)" 
		[ivfValidateName]="'validateTreatmentPlanBatch'" [showIvfData]="showIvfData"> </app-ivfpopup>
	
</div>
