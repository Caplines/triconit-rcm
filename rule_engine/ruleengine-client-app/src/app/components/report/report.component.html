
	<div class="inner-bg">
		<div *ngIf="!showReportData" class="container">
			<div class="row">
				<div class="col-sm-6 col-sm-offset-3 form-box">
					<div class="dropdown">
						<button class="btn btn-block dropdown-toggle" type="button" data-toggle="dropdown" (click)="showReportForm = false">
							<span class="caret"></span>Select Report to Run
						</button>
						<ul class="dropdown-menu">
							<li><a href="javascript:void(0)" (click)="reportParam('TreatmentId')">Treatment Plan Id</a></li>
							<li><a href="javascript:void(0)" (click)="reportParam('IvfId')">IVF Form Id</a></li>
							<li><a href="javascript:void(0)" (click)="reportParam('Date')">Date Run</a></li>
							<li><a href="javascript:void(0)" (click)="reportParam('PatientName')">Patient Name</a></li>
						</ul>
					</div>
					<!-- <div class="form-top">
						<div class="form-top-left">
							<a href="javascript:void(0)" (click)="showReportForm = true"><h3 class="ivf-title">Select Report to Run</h3></a>
						</div>
						
					</div> -->

					<div *ngIf="showReportForm" class="form-bottom">
						<form class="login-form" name="form" (ngSubmit)="f.form.valid && runReport()" #f="ngForm" novalidate>
							<!--  <div class="alert alert-danger" role="alert" *ngIf="errorMessage">{{errorMessage}}</div>  -->
							<span id="reauth-email" class="reauth-email"></span>
							
							<div class="form-group" [ngClass]="{ 'has-error': f.submitted }">
								<label class="sr-only" for="reportField1">Report Field</label>
								<div *ngIf="showParam.TreatmentId">
									<input type="text" class="login-signup-form-field form-control" name="reportField1" id="reportField1" [(ngModel)]="report.reportField1" #reportField1="ngModel" placeholder="Treatment Plan Id..." required />
									<div *ngIf="f.submitted && !reportField1.valid" class="error-msg">Please enter Treatment Plan Id.</div>
								</div>
								<div *ngIf="showParam.IvfId">
									<input type="text" class="login-signup-form-field form-control" name="reportField1" id="reportField1" [(ngModel)]="report.reportField1" #reportField1="ngModel" placeholder="IVF Id..." required />
									<div *ngIf="f.submitted && !reportField1.valid" class="error-msg">Please enter IVF Id.</div>
								</div>
								<div *ngIf="showParam.Date" class="date-dropdown">
									<ng-datepicker [(ngModel)]="report.reportField1" name="datePicker" [options]="dateOptions"></ng-datepicker>
									<div *ngIf="f.submitted && report.reportField1==''" class="error-msg">Please select valid Date.</div>
								</div>
								<div *ngIf="showParam.PatientName">
									<input type="text" class="login-signup-form-field form-control" name="reportField1" id="reportField1" [(ngModel)]="report.reportField1" #reportField1="ngModel" placeholder="Patient Name..." required />
									<div *ngIf="f.submitted && !reportField1.valid" class="error-msg">Please enter Patient Name.</div>
								</div>
							</div>
			
							<div class="form-group" [ngClass]="{ 'has-error': f.submitted }">
								<label class="sr-only" for="officeId">Office Name</label> 
								<select class="login-signup-form-field form-control" name="officeId" id="officeId" [(ngModel)]="report.officeId">
									<option value="">Office Name...</option>
									<option *ngFor="let title of offices" [value]="title.uuid">{{title.name}}</option>
								</select>
								<div *ngIf="f.submitted && report.officeId==''" class="error-msg">Office Name is required</div>
							</div>
							
							<p><button [disabled]="showLoading" type="submit" class="btn">Submit</button></p>
							
							<div *ngIf="showLoading" class="loader"></div>							    
						</form>
					</div> 
				</div>
				
			</div>
			
		</div>
		
		
		
		
		<div *ngIf="showReportData">
			<div class="close-btn">
				<a href="javascript:void(0)" (click)="showReportData=false;">
					Go Back
				</a>
			</div>	
			<div *ngFor="let key of arrayOfKeys" class="table-container">
				<h3>{{key}}</h3>
				<table class="table table-bordered table-striped">
					<thead>
						<tr>
							<th class="date-width">Created Date</th>
							<th>Error Message</th>
							<th>Rule Name</th>
						</tr>
					</thead>
					<tbody>
						<tr *ngFor="let data of reportData[key]">
							<td><span [innerHTML]="data.rd_created_date"></span></td>
							<td><span [innerHTML]="data.error_message"></span></td>
							<td><span [innerHTML]="data.rule_name"></span></td>
						<tr>
					</tbody>						
				</table>
			</div>
		</div>	
		
	</div>
