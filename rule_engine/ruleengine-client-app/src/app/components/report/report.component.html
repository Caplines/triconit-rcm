
	<div class="inner-bg">
		<div class="container">
			<div class="row">
				<div class="col-sm-6 col-sm-offset-3 form-box">
					<div class="dropdown">
						<button class="btn btn-block dropdown-toggle" type="button" data-toggle="dropdown" (click)="showReportForm = false">
							<span class="caret"></span>Select Report to Run
						</button>
						<ul class="dropdown-menu">
							<li><a href="javascript:void(0)" (click)="reportParam('id')">Treatment Plan Id</a></li>
							<li><a href="javascript:void(0)" (click)="reportParam('date')">Date Run</a></li>
							<li><a href="javascript:void(0)" (click)="reportParam('name')">Patient Name</a></li>
						</ul>
					</div>
					<!-- <div class="form-top">
						<div class="form-top-left">
							<a href="javascript:void(0)" (click)="showReportForm = true"><h3 class="ivf-title">Select Report to Run</h3></a>
						</div>
						
					</div> -->

					<div *ngIf="showReportForm" class="form-bottom">
						<form class="login-form" name="form" (ngSubmit)="f.form.valid && validateIVF()" #f="ngForm" novalidate>
							<!--  <div class="alert alert-danger" role="alert" *ngIf="errorMessage">{{errorMessage}}</div>  -->
							<span id="reauth-email" class="reauth-email"></span>
							
							<div *ngIf="reportParamId" class="form-group" [ngClass]="{ 'has-error': f.submitted && !treatmentPlanId.valid }">
								<label class="sr-only" for="treatmentPlanId">Treatment Plan Id</label>
								<input type="text" class="login-signup-form-field form-control" name="treatmentPlanId" id="treatmentPlanId" [(ngModel)]="report.treatmentPlanId" #treatmentPlanId="ngModel" placeholder="Treatment Plan Id..." required />
								<div *ngIf="f.submitted && !treatmentPlanId.valid" class="error-msg">Please enter Treatment Plan Id.</div>
							</div>
			
							<div *ngIf="reportParamDate" class="form-group date-dropdown" [ngClass]="{ 'has-error': f.submitted && !date.valid }"> 
								<label class="sr-only" for="dateRun">Date Run</label>
								<ng-datepicker [(ngModel)]="report.date" name="datePicker" [options]="dateOptions"></ng-datepicker>
								<div *ngIf="f.submitted && !date.valid" class="error-msg">Please select valid Date.</div>
							</div>
							
							<div *ngIf="reportParamName" class="form-group" [ngClass]="{ 'has-error': f.submitted && !patientName.valid }">
								<label class="sr-only" for="patientName">Patient Name</label>
								<input type="text" class="login-signup-form-field form-control" name="patientName" id="patientName" [(ngModel)]="report.patientName" #patientName="ngModel" placeholder="Patient Name..." required />
								<div *ngIf="f.submitted && !patientName.valid" class="error-msg">Please enter Patient Name.</div>
							</div>
							
							<p><button (click)="showReportForm = false" type="submit" class="btn">Submit</button></p>
							
							<div *ngIf="showLoading" class="loader"></div>							    
						</form>
					</div> 
				</div>
			</div>

		</div>
	</div>
