
<div class="inner-bg">
	<div class="container">
		<div class="row">
			<div class="col-sm-6 col-sm-offset-3 form-box">
				<div class="form-top">
					<div class="form-top-left">
						<h3 class="ivf-title">Enter Details for Validating Treatment
							Plan</h3>
					</div>
				</div>

				<div class="form-bottom">
					<form class="login-form" name="form"
						(ngSubmit)="f.form.valid && validateIVF()" #f="ngForm" novalidate>
						<!-- <div class="alert alert-danger" role="alert" *ngIf="errorMessage">{{errorMessage}}</div> -->
						<span id="reauth-email" class="reauth-email"></span>

						<div class="form-group"
							[ngClass]="{ 'has-error': f.submitted && !treatmentPlanId.valid }">
							<label class="sr-only" for="treatmentPlanId">Treatment
								Plan Id</label> <input type="text"
								class="login-signup-form-field form-control"
								name="treatmentPlanId" id="treatmentPlanId"
								[(ngModel)]="ivfm.treatmentPlanId" #treatmentPlanId="ngModel"
								placeholder="Treatment Plan Id..." required />
							<div *ngIf="f.submitted && !treatmentPlanId.valid"
								class="error-msg">Please enter Treatment Plan Id.</div>
						</div>

						<div class="form-group"
							[ngClass]="{ 'has-error': f.submitted && !ivfId.valid }">
							<label class="sr-only" for="ivfId">IVF Form Id</label> <input
								type="text" class="login-signup-form-field form-control"
								name="ivfId" id="ivfId" [(ngModel)]="ivfm.ivfId"
								#ivfId="ngModel" placeholder="IVF Id..." required />
							<div *ngIf="f.submitted && !ivfId.valid" class="error-msg">Please
								enter IVF Id.</div>
						</div>

						<div class="form-group" [ngClass]="{ 'has-error': f.submitted }">
							<label class="sr-only" for="officeId">Office Name</label> <select
								name="officeId" [(ngModel)]="ivfm.officeId"
								class="login-signup-form-field form-control" id="officeId">
								<option value="">Office Name...</option>
								<option *ngFor="let title of offices" [value]="title.uuid">{{title.name}}</option>
							</select>
							<div *ngIf="f.submitted && ivfm.officeId==''" class="error-msg">The
								Office Name is required</div>
						</div>


						<p>
							<button [disabled]="showLoading" type="submit" class="btn">Validate
								Treatment Plan</button>
						</p>

						<div *ngIf="showLoading" class="loader"></div>

					</form>
				</div>
			</div>
		</div>

	</div>
</div>


<div *ngIf="showPopup" class="validation-modal">
	<div class="modal-backdrop fade in"></div>
	<div id="modal-login" class="modal fade in" tabindex="-1"
		style="display: block">
		<div class="modal-dialog" role="document">
			<div class="modal-content">
				<div class="modal-header">
					<button type="button" class="close" (click)="showPopup=false;">
						<span aria-hidden="true">&times;</span>
					</button>
					<h4 class="modal-title" id="myModalLabel">Validation Messages</h4>
				</div>
				<div class="modal-body">
					<div *ngFor="let key of arrayOfKeys">
						<h3>{{key}}</h3>
						<ul *ngFor="let data of ivfmData[key]" class="message-container">
							<li [innerHTML]="data.ruleName +' - '+ data.message"></li>
						</ul>
					</div>
				</div>
				<!-- <div class="modal-footer"></div> -->
			</div>
		</div>
	</div>
</div>
