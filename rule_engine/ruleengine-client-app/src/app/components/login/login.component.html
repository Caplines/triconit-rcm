<div class="top-content">
	<div class="inner-bg">
		<div class="container">
			<div class="row">
				<div class="col-sm-8 col-sm-offset-2 text">
					<h1><strong>Smile Point</strong> <br>Dental Clinic Insurance</h1>
				</div>
			</div>
			<div class="row">
				<div class="col-sm-6 col-sm-offset-3 form-box">
					<div class="form-top">
						<div class="form-top-left">
							<h3>Login</h3>
						</div>
					</div>
					<div class="form-bottom">						
						<form class="login-form" name="form-signin" (ngSubmit)="f.form.valid && login()" #f="ngForm" novalidate>
							<div class="alert alert-danger" role="alert" *ngIf="errorMessage">{{errorMessage}}</div>
							<span id="reauth-email" class="reauth-email"></span>
							
							<div class="form-group" [ngClass]="{ 'has-error': f.submitted && !email.valid }">
								<label class="sr-only" for="email">Email Address</label>
								<input type="text" class="login-signup-form-field form-control" id="email" name="email" pattern="[^ @]*@[^ @]*" [(ngModel)]="user.email" #email="ngModel" placeholder="Email/Username..." required />
								<div *ngIf="f.submitted && !email.valid" class="error-msg">Please enter a valid email address.</div>
							</div>
							
							<div class="form-group" [ngClass]="{ 'has-error': f.submitted && !password.valid }">
								<label class="sr-only" for="password">Password</label>
								<input type="password" class="login-signup-form-field form-control" id="password" name="password" [(ngModel)]="user.password" #password="ngModel" placeholder="Password..." required />
								<div *ngIf="f.submitted && !password.valid" class="error-msg">Please enter a password.</div>
							</div>
							
							<div id="remember" class="checkbox"></div>							
							<p><button type="submit" class="btn">LOGIN</button></p>
							<!-- <div class="text-center">
								Don't have an account? <a [routerLink]="['/register']">Sign Up</a>
							</div> -->
						</form>
					</div>
				</div>
			</div>

		</div>
	</div>
 </div>
