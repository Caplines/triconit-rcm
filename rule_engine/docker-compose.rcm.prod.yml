# ============================================================
# RCM — PRODUCTION
# Images pulled from Docker Hub. No builds happen here.
#
# Usage:
#   docker compose -f docker-compose.rcm.prod.yml pull
#   docker compose -f docker-compose.rcm.prod.yml up -d
#
# To update a single service:
#   docker compose -f docker-compose.rcm.prod.yml pull rcm-backend
#   docker compose -f docker-compose.rcm.prod.yml up -d --no-deps rcm-backend
# ============================================================

services:
  rcm-backend:
    image: ${DOCKER_HUB_REPO}:rcm-backend-${RCM_VERSION:-latest}
    container_name: rcm-backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    ports:
      - "8082:8081"
    expose:
      - "8081"
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    volumes:
      - /opt/project/tricon/files:/opt/project/tricon/files
      - /opt/project/tricon/log:/opt/project/tricon/log
      - /opt/project/attachments:/opt/project/attachments
      - /opt/project/pdf:/opt/project/pdf
      - /opt/project/xml:/opt/project/xml
    networks:
      - rcm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/account/login > /dev/null 2>&1 || curl -sf http://localhost:8081/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  rcm-frontend:
    image: ${DOCKER_HUB_REPO}:rcm-frontend-${RCM_VERSION:-latest}
    container_name: rcm-frontend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      - RCM_DOMAIN=${RCM_DOMAIN}
      - RCM_SERVER_NAME=${RCM_SERVER_NAME}
      - PROXY_CONNECT_TIMEOUT=${PROXY_CONNECT_TIMEOUT:-60s}
      - PROXY_SEND_TIMEOUT=${PROXY_SEND_TIMEOUT:-1800s}
      - PROXY_READ_TIMEOUT=${PROXY_READ_TIMEOUT:-1800s}
      - NGINX_SEND_TIMEOUT=${NGINX_SEND_TIMEOUT:-1800s}
    expose:
      - "80"
    depends_on:
      - rcm-backend
    networks:
      - rcm-network
      - shared-proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  rcm-network:
    driver: bridge
  shared-proxy:
    external: true
