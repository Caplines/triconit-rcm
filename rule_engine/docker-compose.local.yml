# Run from rule_engine/ directory so ./certs and ./ruleengine resolve correctly:
#   cd rule_engine
#   ./scripts/generate-es-ssl-certs.sh   # creates certs/cacerts.jks and certs/keystore.jks
#   docker compose -f docker-compose.local.yml up --build
#
version: "3.9"

services:

  # =========================
  # Spring Boot Backend (DEV)
  # =========================
  backend:
    image: eclipse-temurin:8-jdk
    container_name: ruleengine-backend
    working_dir: /app
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    ports:
      - "8081:8080"
    env_file: .env
    environment:
      # Use 'docker' so SSL paths point to /opt/project/tricon/client (mounted below)
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ./ruleengine:/app
      - ~/.m2:/root/.m2
      - /opt/project/tricon/files:/opt/project/tricon/files
      - /opt/project/tricon/log:/opt/project/tricon/log
      - ./certs:/opt/project/tricon/client
      - /opt/project/tricon/xml:/opt/project/tricon/xml
      - /opt/project/tricon/chrome:/opt/project/tricon/chrome
      - "../ivf Form:/opt/xslt"
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y maven &&
      mvn initialize &&
      mvn spring-boot:run
      "
    networks:
      - ruleengine-network


  # =========================
  # Angular Frontend (DEV) – built image + nginx (same as prod path, ENV=local)
  # Uses nginx.local.conf so /api/v1 proxies to local backend; no proxy.conf.json.
  # After changing frontend code, run: docker compose -f docker-compose.local.yml up --build
  # =========================
  frontend:
    build:
      context: ./ruleengine-client-app
      dockerfile: Dockerfile
      args:
        ENV: local
    container_name: ruleengine-frontend
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - ruleengine-network


networks:
  ruleengine-network:
    driver: bridge

