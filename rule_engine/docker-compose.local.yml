# Run from rule_engine/ directory:
#   cd rule_engine
#   docker compose -f docker-compose.local.yml up --build
#
# Data under /opt/project and /opt/xslt uses Docker named volumes (no host bind mounts).
# For ES client certs/JKS, copy into the named volume or use ES_SSL_CLIENT_TRUSTALL=true in .env.
# Prod compose files bind-mount server paths instead.
#
version: "3.9"

services:

  # =========================
  # Spring Boot Backend (DEV)
  # =========================
  backend:
    image: eclipse-temurin:8-jdk
    container_name: ruleengine-backend
    working_dir: /app
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    ports:
      - "8081:8080"
    env_file: .env
    environment:
      # Use 'docker' so SSL paths point to /opt/project/tricon/client (mounted below)
      - SPRING_PROFILES_ACTIVE=docker
      # Give the JVM enough heap to avoid GC thrash OOM. Without this the JVM
      # defaults to a small fraction of host RAM and thrashes under load.
      - JAVA_TOOL_OPTIONS=-Xms512m -Xmx1536m -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof
    volumes:
      - ./ruleengine:/app
      - ~/.m2:/root/.m2
      - ruleengine_local_tricon_files:/opt/project/tricon/files
      - ruleengine_local_tricon_log:/opt/project/tricon/log
      - ruleengine_local_tricon_client:/opt/project/tricon/client
      - ruleengine_local_tricon_xml:/opt/project/tricon/xml
      - ruleengine_local_tricon_chrome:/opt/project/tricon/chrome
      - ruleengine_local_xslt:/opt/xslt
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y maven &&
      mvn initialize &&
      mvn spring-boot:run
      "
    networks:
      - ruleengine-network


  # =========================
  # Angular Frontend (DEV) – built image + nginx (same as prod path, ENV=local)
  # Uses nginx.local.conf so /api/v1 proxies to local backend; no proxy.conf.json.
  # After changing frontend code, run: docker compose -f docker-compose.local.yml up --build
  # =========================
  frontend:
    build:
      context: ./ruleengine-client-app
      dockerfile: Dockerfile
      args:
        ENV: local
    container_name: ruleengine-frontend
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    ports:
      - "4200:80"
    environment:
      - PROXY_CONNECT_TIMEOUT=${PROXY_CONNECT_TIMEOUT:-60s}
      - PROXY_SEND_TIMEOUT=${PROXY_SEND_TIMEOUT:-1800s}
      - PROXY_READ_TIMEOUT=${PROXY_READ_TIMEOUT:-1800s}
      - NGINX_SEND_TIMEOUT=${NGINX_SEND_TIMEOUT:-1800s}
    depends_on:
      - backend
    networks:
      - ruleengine-network


networks:
  ruleengine-network:
    driver: bridge

volumes:
  ruleengine_local_tricon_files:
  ruleengine_local_tricon_log:
  ruleengine_local_tricon_client:
  ruleengine_local_tricon_xml:
  ruleengine_local_tricon_chrome:
  ruleengine_local_xslt:

