services:
  # Spring Boot Backend
  backend:
    build:
      context: ./ruleengine
      dockerfile: Dockerfile
    container_name: ruleengine-backend
    restart: unless-stopped
    ports:
      - "8081:8080"  # Map to 8081 to avoid conflict with other services
    expose:
      - "8080"  # Internal port for nginx to access
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    volumes:
      # Persist application data
      - backend-files:/opt/project/tricon/files
      - backend-logs:/opt/project/tricon/log
      - backend-client:/opt/project/tricon/client
      - backend-xml:/opt/project/tricon/xml
      - backend-chrome:/opt/project/tricon/chrome

    networks:
      - ruleengine-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Angular Frontend (Nginx)
  frontend:
    build:
      context: ./ruleengine-client-app
      dockerfile: Dockerfile
      args:
        ENV: local  # Local development (HTTP only)
    container_name: ruleengine-frontend
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP only for local dev
    depends_on:
      - backend
    networks:
      - ruleengine-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ruleengine-network:
    driver: bridge

volumes:
  backend-files:
  backend-logs:
  backend-client:
  backend-xml:
  backend-chrome:
