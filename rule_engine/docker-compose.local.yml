version: "3.9"

services:

  # =========================
  # Spring Boot Backend (DEV)
  # =========================
  backend:
    image: eclipse-temurin:8-jdk
    container_name: ruleengine-backend
    working_dir: /app
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    volumes:
      - ./ruleengine:/app
      - ~/.m2:/root/.m2
      - backend-files:/opt/project/tricon/files
      - backend-logs:/opt/project/tricon/log
      - backend-client:/opt/project/tricon/client
      - backend-xml:/opt/project/tricon/xml
      - backend-chrome:/opt/project/tricon/chrome
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y maven &&
      mvn initialize &&
      mvn spring-boot:run
      "
    networks:
      - ruleengine-network


  # =========================
  # Angular Frontend (DEV) – built image + nginx (same as prod path, ENV=local)
  # Uses nginx.local.conf so /api/v1 proxies to local backend; no proxy.conf.json.
  # After changing frontend code, run: docker compose -f docker-compose.local.yml up --build
  # =========================
  frontend:
    build:
      context: ./ruleengine-client-app
      dockerfile: Dockerfile
      args:
        ENV: local
    container_name: ruleengine-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - ruleengine-network


networks:
  ruleengine-network:
    driver: bridge

volumes:
  backend-files:
  backend-logs:
  backend-client:
  backend-xml:
  backend-chrome: