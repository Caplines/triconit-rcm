version: "3.9"

services:

  # =========================
  # Spring Boot Backend (DEV)
  # =========================
  backend:
    image: eclipse-temurin:8-jdk
    container_name: ruleengine-backend
    working_dir: /app
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    volumes:
      - ./ruleengine:/app
      - ~/.m2:/root/.m2
      - backend-files:/opt/project/tricon/files
      - backend-logs:/opt/project/tricon/log
      - backend-client:/opt/project/tricon/client
      - backend-xml:/opt/project/tricon/xml
      - backend-chrome:/opt/project/tricon/chrome
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y maven &&
      mvn initialize &&
      mvn spring-boot:run
      "
    networks:
      - ruleengine-network


  # =========================
  # Angular Frontend (DEV)
  # =========================
  frontend:
    image: node:10.24.1
    container_name: ruleengine-frontend
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ./ruleengine-client-app:/app
      - /app/node_modules
    command: >
      bash -c "
      npm install --unsafe-perm &&
      npm start -- --host 0.0.0.0
      "
    depends_on:
      - backend
    networks:
      - ruleengine-network


networks:
  ruleengine-network:
    driver: bridge

volumes:
  backend-files:
  backend-logs:
  backend-client:
  backend-xml:
  backend-chrome: